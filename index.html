<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Fluency Lab | Offline First</title>
<style>
/* ===== DESIGN TOKENS ===== */
:root { --bg:#0b0f1a; --panel:#111827; --border:#1f2937; --text:#e5e7eb; --muted:#9ca3af; --primary:#22d3ee; --primary-h:199,89%,48%; --accent:#f472b6; --success:#34d399; --warn:#fbbf24; --danger:#f87171; --radius:12px; --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.light { --bg:#f8fafc; --panel:#ffffff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b; --primary:#0891b2; --accent:#db2777; --success:#059669; --warn:#d97706; --danger:#dc2626; }
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font)}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;transition:background .3s,color .3s;line-height:1.5}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit;font-size:1rem}
input,textarea,select{font-family:inherit;font-size:1rem;color:var(--text);background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 2px color-mix(in srgb, var(--primary) 20%, transparent)}
::placeholder{color:var(--muted)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ===== LAYOUT ===== */
.app{display:flex;width:100%;min-height:100vh}
.sidebar{width:260px;min-width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1rem;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.logo{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.logo svg{width:32px;height:32px;color:var(--primary);flex-shrink:0}
.logo h1{font-size:1.25rem;font-weight:700;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
.nav{display:flex;flex-direction:column;gap:0.25rem}
.nav-link{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0.9rem;border-radius:8px;color:var(--muted);font-weight:500;transition:all .15s;white-space:nowrap}
.nav-link:hover{background:color-mix(in srgb, var(--primary) 10%, transparent);color:var(--text)}
.nav-link.active{background:color-mix(in srgb, var(--primary) 15%, transparent);color:var(--primary);border-left:3px solid var(--primary)}
.nav-link svg{width:20px;height:20px;flex-shrink:0}
.nav-badge{margin-left:auto;background:color-mix(in srgb, var(--primary) 20%, transparent);color:var(--primary);font-size:0.7rem;padding:0.1rem 0.5rem;border-radius:999px}
.stats{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;text-align:center}
.stat{padding:0.75rem;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.stat-value{font-size:1.5rem;font-weight:700;color:var(--primary)}
.stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
.main{flex:1;overflow-y:auto;padding:1.5rem 2rem;max-width:900px;margin:0 auto;width:100%}
.view{display:none;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.header h2{font-size:1.75rem;font-weight:700}
.header .meta{color:var(--muted);font-size:0.9rem}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;transition:border .2s}
.card:hover{border-color:color-mix(in srgb, var(--primary) 30%, transparent)}
.card h3{font-size:1rem;font-weight:600;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem}
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.1rem;border-radius:8px;font-weight:600;font-size:0.875rem;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#0b0f1a}.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost{color:var(--muted)}.btn-ghost:hover{color:var(--text);background:var(--bg)}
.btn-sm{padding:0.4rem 0.8rem;font-size:0.8rem}
.btn-danger{background:color-mix(in srgb, var(--danger) 15%, transparent);color:var(--danger);border:1px solid var(--danger)}.btn-danger:hover{background:var(--danger);color:white}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}@media(max-width:700px){.grid-2{grid-template-columns:1fr}}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}}@media(max-width:600px){.grid-4{grid-template-columns:1fr}}
.chip{display:inline-flex;align-items:center;gap:0.35rem;padding:0.2rem 0.7rem;border-radius:999px;font-size:0.75rem;font-weight:600;background:var(--bg);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.active{background:color-mix(in srgb, var(--primary) 20%, transparent);border-color:var(--primary);color:var(--primary)}
.chip.learned{background:color-mix(in srgb, var(--success) 20%, transparent);border-color:var(--success);color:var(--success)}
.chip.learning{background:color-mix(in srgb, var(--warn) 20%, transparent);border-color:var(--warn);color:var(--warn)}
.tabs{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:0.5rem 1rem;border-radius:8px;font-weight:500;color:var(--muted);background:transparent}.tab:hover{color:var(--text);background:var(--bg)}.tab.active{color:var(--primary);background:color-mix(in srgb, var(--primary) 15%, transparent)}
.exercise{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:0.75rem}
.fill{background:var(--bg);border:none;border-bottom:2px solid var(--border);color:var(--text);padding:0.4rem 0.6rem;border-radius:4px;min-width:100px;text-align:center;outline:none}
.fill:focus{border-bottom-color:var(--primary)}
.fill.correct{border-bottom-color:var(--success);color:var(--success);background:color-mix(in srgb, var(--success) 10%, transparent)}
.fill.incorrect{border-bottom-color:var(--danger);color:var(--danger);background:color-mix(in srgb, var(--danger) 10%, transparent)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-radius:8px;background:var(--panel);border:1px solid var(--border);box-shadow:0 10px 30px -10px rgba(0,0,0,.5);animation:slideIn .3s ease}
.toast.success{border-left:4px solid var(--success)}.toast.error{border-left:4px solid var(--danger)}.toast.warn{border-left:4px solid var(--warn)}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:50;animation:fadeIn .2s ease}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:popIn .25s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:1.5rem;overflow-y:auto}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.75rem}
.kbd{display:inline-block;padding:0.15rem 0.5rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-family:monospace;font-size:0.75rem}
.progress-ring{transform:rotate(-90deg);width:80px;height:80px}
.progress-bg{fill:none;stroke:var(--border);stroke-width:6}
.progress-bar{fill:none;stroke:var(--primary);stroke-width:6;stroke-linecap:round;stroke-dasharray:377;transition:stroke-dashoffset .5s ease}

/* ICONS (Inline SVG) */
.icon{width:20px;height:20px;vertical-align:middle;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-sm{width:16px;height:16px}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Sidebar rendered by JS -->
  <main class="main" id="main"></main>
  <div id="toast-root"></div>
  <div id="modal-root"></div>
</div>

<script>
// ============================================================
// 1. DATA (Embedded, No Fetch)
// ============================================================
const CURRICULUM = [
{w:1,p:1,t:"Daily Life & Work Collocations",v:"High-frequency verb+noun collocations (make/do/take/have/get)",g:"Present Perfect vs Past Simple",gd:`<h4>Present Perfect vs Past Simple</h4><p><b>Present Perfect:</b> Life experience, recent past (just/already/yet), unfinished time. <i>I've worked here for 5 years.</i></p><p><b>Past Simple:</b> Finished actions at specific time. <i>I worked there in 2019.</i></p><p><b>Triggers:</b> PP: ever, never, just, already, yet, since, for. PS: yesterday, last week, in 2020, ago.</p>`,i:"BBC 6 Minute English: 'The daily grind'",o:"Describe your typical workday using 10 collocations. Record 2 min.",w:["carry out","come across","deal with","find out","give up","go on","look for","make sure","point out","set up","take place","work out","break down","bring up","cut down","run out of","come up with","get along","look forward to","take advantage of"]},
{w:2,p:1,t:"Precise Personality Adjectives",v:"Advanced adjectives + dependent prepositions",g:"Relative Clauses",gd:`<h4>Relative Clauses</h4><p><b>Defining:</b> Essential info, no commas. <i>The colleague who sits next to me is loud.</i></p><p><b>Non-defining:</b> Extra info, commas. <i>My boss, who is from London, speaks 3 languages.</i></p>`,i:"English with Lucy (YouTube): 'Advanced Adjectives'",o:"Write a 150-word character sketch using 8 new adjectives.",w:["conscientious","adaptable","resilient","meticulous","pragmatic","ambivalent","aloof","gregarious","prone to","averse to","capable of","dependent on","suspicious of","tolerant of","obsessed with","disillusioned with","invaluable","indispensable","counterproductive","detrimental"]},
{w:3,p:1,t:"Travel, Logistics & Movement",v:"Phrasal Verbs: Movement (get around, check in, set off)",g:"Future Forms Review",gd:`<h4>Future Forms</h4><p><b>Will:</b> Spontaneous decisions, predictions. <i>I'll book it now.</i></p><p><b>Going to:</b> Plans, evidence-based predictions. <i>We're going to visit Kyoto.</i></p><p><b>Present Continuous:</b> Fixed arrangements. <i>I'm meeting the client at 3pm.</i></p>`,i:"Luke's English Podcast: 'Travel Stories'",o:"Plan a complex 3-city itinerary. Explain logistics to a partner.",w:["set off","check in","get away","stop over","look around","get lost","run out of","come back","go ahead","hold up","speed up","slow down","check out","drop off","pick up","see off","take off","touch down","get through","look up"]},
{w:4,p:1,t:"Health, Body & Medical Precision",v:"Medical collocations (chronic pain, adverse reaction)",g:"Modals of Deduction",gd:`<h4>Modals of Deduction</h4><p><b>Must be:</b> 95% sure. <i>He must have a cold.</i></p><p><b>Might/Could be:</b> 50% possibility. <i>It might be an allergy.</i></p><p><b>Can't be:</b> 95% sure false. <i>He can't be a doctor.</i></p>`,i:"TED Talk: 'What makes a good life?'",o:"Roleplay: Explain symptoms to a doctor precisely.",w:["alleviate","diagnose","prescribe","recover","susceptible","immune","chronic","acute","side effect","dosage","referral","consultation","underlying condition","preventive measure","adverse reaction","contraindication","remission","relapse","prognosis","palliative"]},
{w:5,p:1,t:"Technology & Digital Life",v:"Tech collocations (deploy, scalable, latency)",g:"Passive Voice (Processes)",gd:`<h4>Passive Voice</h4><p><b>Form:</b> be + past participle. Focus on action.</p><p><b>Processes:</b> <i>The data is encrypted, then transmitted.</i></p><p><b>Impersonal:</b> <i>It is believed that... / Users are advised to...</i></p>`,i:"Fireship (YouTube): 'CI/CD in 100 seconds'",o:"Explain a tech problem to a non-tech person (2 min).",w:["troubleshoot","debug","deploy","integrate","migrate","latency","bandwidth","scalable","intuitive","obsolete","patch","rollback","downtime","throughput","bottleneck","refactor","legacy code","api endpoint","authentication","encryption"]},
{w:6,p:1,t:"Money, Finance & Consumer Rights",v:"Financial verbs (accrue, default, leverage)",g:"Conditionals (1st, 2nd, 3rd, Mixed)",gd:`<h4>Conditionals</h4><p><b>1st:</b> Real future. <i>If rates rise, I'll remortgage.</i></p><p><b>2nd:</b> Hypothetical present. <i>If I were rich, I'd invest.</i></p><p><b>3rd:</b> Regret past. <i>If I'd saved, I'd have bought a house.</i></p>`,i:"Planet Money (NPR): 'Inflation explained'",o:"Compare 2 investment options. Write a formal complaint email.",w:["accrue","default","leverage","liquidate","reimburse","solvent","volatile","asset","liability","equity","dividend","inflation","principal","interest rate","collateral","foreclosure","bankruptcy","audit","compliance","disclosure"]},
{w:7,p:1,t:"Environment & Sustainability",v:"Academic nouns (mitigation, biodiversity)",g:"Cleft Sentences",gd:`<h4>Cleft Sentences (Emphasis)</h4><p><b>It-cleft:</b> <i>It was the government that failed to act.</i></p><p><b>Wh-cleft:</b> <i>What we need is immediate action.</i></p>`,i:"TED: 'The case for optimism on climate change'",o:"Present a 3-min policy argument.",w:["mitigation","degradation","biodiversity","sustainable","renewable","emissions","footprint","conservation","advocate","implement","legislation","compliance","carbon neutral","net zero","circular economy","greenwashing","deforestation","acidification","resilience","adaptation"]},
{w:8,p:1,t:"PHASE 1 CONSOLIDATION",v:"Review Top 150 Collocations",g:"Full Tense Review",gd:`<h4>Consolidation Week</h4><ul><li>Identify top 10 fossilized errors.</li><li>Activate passive vocabulary Weeks 1-7.</li><li>Mock Exam: Reading & Use of English (B2 First).</li></ul>`,i:"Mock Listening Paper (B2 First)",o:"Full Speaking Mock + Writing (Essay).",w:[]},
{w:9,p:2,t:"Idioms & Conceptual Metaphors",v:"Body/Nature metaphors",g:"Inversion",gd:`<h4>Inversion</h4><p>Auxiliary before subject after negative adverbials.</p><p><b>Not only:</b> <i>Not only did he arrive late...</i></p><p><b>Seldom/Rarely:</b> <i>Seldom have I seen...</i></p>`,i:"English Like A Native: '20 Advanced Idioms'",o:"Storytelling: Use 7 idioms in 2-min anecdote.",w:["break the ice","cost an arm and a leg","hit the nail on the head","under the weather","see eye to eye","once in a blue moon","piece of cake","spill the beans","pull someone's leg","beat around the bush","burn the midnight oil","food for thought","digest the information","swallow the pill","sharp tongue","cold shoulder","heavy heart","clear the air","storm in a teacup","weather the storm"]},
{w:10,p:2,t:"Professional Communication",v:"Discourse markers, buzzwords",g:"Reported Speech Patterns",gd:`<h4>Reporting Verbs Patterns</h4><p><b>Verb + that:</b> suggest, insist, recommend.</p><p><b>Verb + to-inf:</b> agree, promise, refuse.</p><p><b>Verb + -ing:</b> deny, admit, suggest.</p><p><b>Verb + obj + to-inf:</b> advise, warn, encourage.</p>`,i:"HBR IdeaCast: 'Negotiating with difficult people'",o:"Roleplay: Salary negotiation using 5 markers + 3 reporting verbs.",w:["play devil's advocate","move the needle","touch base","circle back","bandwidth","action items","stakeholder","consensus","push back","buy-in","roadmap","deliverable","low-hanging fruit","deep dive","ballpark figure","on the same page","take offline","flag up","align on","revert to"]},
{w:11,p:2,t:"Society, Culture & Trends",v:"Abstract nouns + collocations",g:"Nominalisation",gd:`<h4>Nominalisation</h4><p>Turning verbs into nouns for density.</p><p><i>We analysed the data -> Our analysis of the data...</i></p><p><b>Suffixes:</b> -tion, -ment, -ance, -ity, -ness.</p>`,i:"The Economist / Guardian Long Read",o:"Essay (250w): 'Social media polarisation'.",w:["foster","exacerbate","mitigate","perpetuate","underpin","polarize","cohesion","disparity","prevalent","inevitable","paradigm","dichotomy","alienation","marginalization","gentrification","commodification","homogenization","stratification","mobility","inequity"]},
{w:12,p:2,t:"Science, Logic & Argumentation",v:"Logical connectors (Hence, Albeit)",g:"Advanced Connectors",gd:`<h4>Advanced Connectors</h4><p><b>Contrast:</b> Conversely, Whereas, While.</p><p><b>Concession:</b> Albeit, Notwithstanding, Admittedly.</p><p><b>Result:</b> Hence, Thereby, Consequently.</p>`,i:"Intelligence Squared Debate",o:"Structure formal argument (Toulmin Model).",w:["hence","thereby","conversely","albeit","notwithstanding","furthermore","consequently","postulate","hypothesis","empirical","anomaly","correlation","causation","variable","control group","significant","margin of error","peer review","replicate","paradigm shift"]},
{w:13,p:2,t:"Arts, Media & Creative Expression",v:"Sensory vocab (evocative, poignant)",g:"Participle Clauses",gd:`<h4>Participle Clauses</h4><p><b>Present (-ing):</b> Active. <i>The painting, hanging in the Louvre...</i></p><p><b>Past (-ed):</b> Passive. <i>Written in 1922, the novel...</i></p><p><b>Perfect:</b> <i>Having failed twice, she persisted.</i></p>`,i:"The New Yorker: Fiction Podcast",o:"Write vivid descriptive paragraph (150w). Film/Book review.",w:["evocative","poignant","visceral","nuanced","ambiguous","aesthetic","cathartic","derivative","authentic","cliché","profound","superficial","melancholic","whimsical","gritty","surreal","resonant","trite","hackneyed"]},
{w:14,p:2,t:"Phrasal Verbs Mastery",v:"Separable/Inseparable patterns",g:"Phrasal Verb Grammar Patterns",gd:`<h4>Phrasal Verb Patterns</h4><p><b>Type 2 Separable:</b> <i>Carry out the task / Carry it out.</i> (Pronoun MIDDLE)</p><p><b>Type 3 Inseparable:</b> <i>Look into the matter / Look into it.</i></p>`,i:"Phrasal Verb Daily Podcast (Review 20 eps)",o:"Register Shift: Rewrite 10 formal sentences using phrasals.",w:["carry out","phase out","account for","bring about","come up with","do away with","follow up","go through","look into","put forward","rule out","set forth","point out","make up for","result in","lead to","consist of","depend on","focus on","deal with"]},
{w:15,p:2,t:"Humor, Sarcasm & Pragmatics",v:"Pragmatic markers, Deadpan, Irony",g:"Question Tags & Intonation",gd:`<h4>Question Tags Intonation</h4><p><b>Falling (↘):</b> Checking known info. <i>Nice day, isn't it? ↘</i></p><p><b>Rising (↗):</b> Genuine question. <i>You didn't lock the door, did you? ↗</i></p>`,i:"Comedy: 'Live at the Apollo' / 'Would I Lie To You?'",o:"Tell a joke with correct timing. Analyse markers.",w:["deadpan","sarcasm","irony","understatement","hyperbole","banter","witty","droll","facetious","tongue-in-cheek","punchline","setup","self-deprecating","observational","slapstick","satire","parody","dry humour","punch up","punch down"]},
{w:16,p:2,t:"PHASE 2 CONSOLIDATION: B2 MOCK",v:"Full Lexical Review",g:"Exam Skills (Cloze, Transformations)",gd:`<h4>Exam Skills (B2 First / IELTS 6.5-7.0)</h4><p><b>Word Formation:</b> Prefixes/Suffixes.</p><p><b>Key Word Transformations:</b> 3-6 words. Passive, Reported Speech, Conditionals.</p>`,i:"Full Listening Paper (Timed)",o:"Full Speaking Test + Writing (Essay + Article).",w:[]},
{w:17,p:3,t:"Precision & Nuance: Near-Synonyms",v:"Semantic gradients",g:"Advanced Hedging",gd:`<h4>Hedging (Academic Caution)</h4><p>Avoid absolute claims. Use:</p><ul><li>Modals: may, might, could, would.</li><li>Adverbs: arguably, presumably, seemingly.</li><li>Verbs: suggest, indicate, appear, tend to.</li></ul>`,i:"Academic Lecture (Coursera/edX Audit)",o:"Rewrite sensationalist news into cautious academic style.",w:["alleviate/mitigate/amend/rectify","essential/crucial/pivotal/paramount","surge/soar/skyrocket/plummet","meticulous/thorough/exhaustive/comprehensive","ambiguous/vague/obscure/cryptic","alleviate","mitigate","amend","rectify","pivotal","paramount","skyrocket","plummet","exhaustive","comprehensive","obscure","cryptic"]},
{w:18,p:3,t:"Register Shifting: Formal <=> Informal",v:"Register pairs (Purchase/Buy)",g:"Subjunctive Mood",gd:`<h4>Subjunctive Mood</h4><p>Base form after necessity verbs.</p><p><b>Verbs:</b> suggest, recommend, insist, demand.</p><p><b>Structure:</b> It is vital that he <b>be</b> informed. (Not <i>is</i>)</p>`,i:"Compare: Legal Contract vs Slack Message vs Academic Abstract",o:"Translate formal notice to Slack message & vice versa.",w:["ascertain","commence","terminate","endeavour","facilitate","necessitate","obtain","retain","sufficient","purchase","request","inquire","assist","depart","arrive","inform","require","attempt","discover"]},
{w:19,p:3,t:"Law, Policy & Governance",v:"Legal collocations (ratify, precedent)",g:"Impersonal Passive",gd:`<h4>Impersonal Passive</h4><p><b>It-passive:</b> <i>It is alleged that he stole the funds.</i></p><p><b>Subject + Passive Inf:</b> <i>He is alleged to have stolen the funds.</i></p>`,i:"Supreme Court Oral Arguments (Oyez.org)",o:"Draft 200-word policy brief: 'Data Privacy Reform'.",w:["ratify","amend","jurisdiction","precedent","statute","legislation","compliance","breach","liable","arbitration","mandate","enforce","litigation","plaintiff","defendant","testimony","verdict","acquit","convict","appeal"]},
{w:20,p:3,t:"Business Strategy & Economics",v:"Strategic verbs (pivot, disrupt)",g:"Future in the Past",gd:`<h4>Future in the Past</h4><p><b>Was going to:</b> Plan that may not happen. <i>We were going to launch...</i></p><p><b>Was to:</b> Formal destiny. <i>He was to become CEO.</i></p><p><b>Would:</b> Prediction from past. <i>Little did they know it would fail.</i></p>`,i:"HBR / The Economist Audio",o:"Case Study Analysis: SWOT + Recommendation.",w:["pivot","disrupt","monetize","scale","bootstrap","stakeholder","ROI","KPI","value proposition","competitive advantage","market fit","churn","acquisition","retention","lifetime value","burn rate","runway","unicorn","exit strategy","due diligence"]},
{w:21,p:3,t:"Academic Writing: Research & Citations",v:"Reporting Verbs (Contend, Refute)",g:"Passive Reporting / Nominal Groups",gd:`<h4>Reporting Verbs Strength</h4><p><b>Weak:</b> suggest, imply, hypothesize.</p><p><b>Neutral:</b> state, report, describe.</p><p><b>Strong:</b> argue, contend, assert, demonstrate.</p><p><b>Critical:</b> refute, contradict, challenge.</p>`,i:"Google Scholar: Read 1 paper in your field",o:"Literature Review paragraph (5 sources, APA/IEEE).",w:["contend","assert","postulate","refute","corroborate","underscore","highlight","demonstrate","imply","suggest","validate","contradict","postulate","hypothesize","theorize","empirical","qualitative","quantitative","methodology","paradigm"]},

const PHASE_NAMES={1:"Phase 1: B1→B2 Transition",2:"Phase 2: B2 Consolidation",3:"Phase 3: C1 Advanced",4:"Phase 4: C2 Mastery"};
const DAY_LESSONS=[
{t:"Vocabulary Input & SRS Setup",tasks:["Review weekly word list in Vocab Lab","Add 10 new words to Lexicon","Do first SRS review session (15 min)"]},
{t:"Grammar Deep Dive",tasks:["Read Grammar Lab explanation","Complete 2 generated exercises","Write 3 personal examples using the structure"]},
{t:"Comprehensible Input",tasks:["Watch/Listen to assigned input (30 min)","Log 3 new phrases","Shadow 1 minute of audio"]},
{t:"Output Practice",tasks:["Speaking Task: Record 2 min","Writing Task: 200 words using 5 weekly words","Get AI feedback (use prompt in Output tab)"]},
{t:"Integration & Fluency",tasks:["Mixed Grammar/Vocab Exercise","Speed review: SRS 'Quick 10'","Retell input content from memory"]},
{t:"Review & Reflect",tasks:["Complete all SRS due cards","Weekly checklist: All 4 daily tasks done?","Plan next week: Preview words in Curriculum"]}
];
const CHECKLIST_KEYS=['srs','input','output','grammar'];
const CHECKLIST_LABELS={srs:'SRS Review (All Due)',input:'Comprehensible Input',output:'Speaking / Writing Output',grammar:'Grammar Exercise'};

// ============================================================
// 2. STATE & PERSISTENCE
// ============================================================
const STORAGE_KEY = 'fluencyLab_offline_v1';
let state = {
  view:'dashboard', week:1, day:1, tab:'day',
  srsActive:false, srsQueue:[], srsIndex:0,
  timerSec:25*60, timerRun:false, timerMode:'pomodoro', timerInt:null,
  sessionSec:0, sessionInt:null,
  wordForm:{id:'',headword:'',ipa:'',def:'',ex:'',type:'word',level:'B2',status:'new',tags:''},
  editId:null,
  modal:null, // 'word'|'week'|'confirm'|'session'
  modalData:null,
  toastQ:[],
  // Persisted
  streak:0, lastActive:null, totalMin:0, words:[], log:[], doneWeeks:[], checks:{},
  settings:{dailyGoal:90,newCards:20,target:'C2',theme:'dark'}
};

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const p=JSON.parse(raw);Object.assign(state,{...p,words:p.words||[],log:p.log||[],doneWeeks:p.doneWeeks||[],checks:p.checks||{},settings:p.settings||state.settings});}
    state.words=state.words||[];state.log=state.log||[];state.doneWeeks=state.doneWeeks||[];state.checks=state.checks||{};state.settings=state.settings||{dailyGoal:90,newCards:20,target:'C2',theme:'dark'};
    calcStreak();applyTheme();
  }catch(e){console.error('Load fail',e);toast('Load error','error');}
}
function save(){
  const p={view:state.view,week:state.week,day:state.day,tab:state.tab,streak:state.streak,lastActive:state.lastActive,totalMin:state.totalMin,words:state.words,log:state.log,doneWeeks:state.doneWeeks,checks:state.checks,settings:state.settings};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(p));
}
function calcStreak(){
  if(!state.lastActive){state.streak=0;return;}
  const today=new Date().toDateString(),last=new Date(state.lastActive).toDateString();
  if(today===last)return;
  const yest=new Date(Date.now()-864e5).toDateString();
  state.streak=last===yest?state.streak+1:1;
}
function applyTheme(){
  document.documentElement.classList.toggle('light',state.settings.theme==='light'||(state.settings.theme==='system'&&!matchMedia('(prefers-color-scheme: dark)').matches));
}

// ============================================================
// 3. HELPERS
// ============================================================
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const fmtTime=s=>{const m=String(Math.floor(s/60)).padStart(2,'0'),sec=String(s%60).padStart(2,'0');return `${m}:${sec}`;};
const fmtInt=ms=>{if(ms<6e4)return Math.round(ms/1000)+'s';if(ms<3.6e6)return Math.round(ms/6e4)+'m';if(ms<8.64e7)return Math.round(ms/3.6e6)+'h';return Math.round(ms/8.64e7)+'d';};
const download=(blob,name)=>{const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);};

// ============================================================
// 4. GETTERS (Computed)
// ============================================================
const G={
  cw:()=>CURRICULUM[state.week-1]||CURRICULUM[CURRICULUM.length-1],
  phase:()=>PHASE_NAMES[G.cw().p],
  todayDay:()=>Math.min(Math.max(state.log.filter(s=>s.w===state.week).length+1,1),6),
  due:()=>state.words.filter(w=>w.srs&&w.srs.due<=Date.now()).length,
  learned:()=>state.words.filter(w=>w.srs?.state===2).length,
  hours:()=>(state.totalMin/60).toFixed(1),
  retention:()=>{const r=state.words.filter(w=>w.srs?.state===2);return r.length?Math.round(r.filter(w=>w.srs.ease>2.2).length/r.length*100):'—';},
  level:()=>state.week<=8?'B1→B2':state.week<=16?'B2':state.week<=22?'C1':'C2',
  weekDone:()=>state.doneWeeks.includes(state.week),
  checks:()=>{const k=`c${state.week}d${state.day}`;return state.checks[k]||{srs:0,input:0,output:0,grammar:0,task0:0,task1:0,task2:0};},
  timerDisp:()=>fmtTime(state.timerSec),
  timerProg:()=>{const t=state.timerMode==='pomodoro'?1500:3000;return((t-state.timerSec)/t)*100;},
  srsStats:()=>({new:state.words.filter(w=>w.srs?.state===0).length,learning:state.words.filter(w=>w.srs?.state===1).length,review:state.words.filter(w=>w.srs?.state===2).length}),
  sessionDisp:()=>fmtTime(state.sessionSec)
};

function render(){
  const app=$('#app');
  app.innerHTML=`
  <aside class="sidebar" id="sidebar">${renderSidebar()}</aside>
  <main class="main" id="main">${renderView()}</main>
  <div id="toast-root" class="toast-root"></div>
  <div id="modal-root" class="modal-root"></div>`;
  bindEvents();
  renderToasts();
  renderModals();
}

  switch(state.view){
    case 'dashboard':return renderDashboard();

    case 'srs':return renderSRS();

}

function renderVocabList(){
  const w=G.cw();
  return w.w.map(v=>{
    const ex=state.words.find(x=>x.headword.toLowerCase()===v.toLowerCase());

// ============================================================
// 7. EVENT BINDING (Delegated)
// ============================================================
function bindEvents(){
  // Sidebar & Nav
  $('#app').onclick=e=>{
    const a=e.target.closest('[data-view]');
    if(a){e.preventDefault();setView(a.dataset.view);return;}
    const tab=e.target.closest('[data-tab]');
    if(tab){state.tab=tab.dataset.tab;render();return;}
    const phase=e.target.closest('[data-phase]');
    if(phase){state.curFilter=phase.dataset.phase==='all'?'all':parseInt(phase.dataset.phase);render();return;}
    const filter=e.target.closest('[data-filter]');
    if(filter){state.lexFilter=filter.dataset.filter;render();return;}
    const action=e.target.closest('[data-action]');
    if(action){doAction(action.dataset.action);return;}
    const check=e.target.closest('[data-check]');
    if(check){toggleCheck(check.dataset.check,check.checked);return;}
    const play=e.target.closest('[data-play]');
    if(play){new Audio(play.dataset.play).play();return;}
    const edit=e.target.closest('[data-edit]');
    if(edit){openWordModal(edit.dataset.edit);return;}
    const del=e.target.closest('[data-del]');
    if(del){if(confirm('Delete?'))deleteWord(del.dataset.del);return;}
    const addW=e.target.closest('[data-add-word]');
    if(addW){openWordModal();setTimeout(()=>{$('#wHw').value=addW.dataset.addWord;},50);return;}
    const week=e.target.closest('[data-week]');
    if(week){openWeekModal(parseInt(week.dataset.week));return;}
    const grade=e.target.closest('[data-grade]');
    if(grade){answerSRS(parseInt(grade.dataset.grade));return;}
    const timer=e.target.closest('[data-timer]');
    if(timer){startTimer(parseInt(timer.dataset.timer));return;}
    const exType=e.target.closest('[data-ex]');
    if(exType){window.gramType=exType.dataset.ex;genGrammarEx();return;}
    const seek=e.target.closest('[data-seek]');
    if(seek){seekShadow(parseInt(seek.dataset.seek));return;}
    const speak=e.target.closest('[data-speak]');
    if(speak){speakShadow(parseInt(speak.dataset.speak));return;}

    // IDs
    const id=e.target.id;
    if(id==='enterClass')enterClassroom();
    else if(id==='prevD'){if(state.day>1){state.day--;render();}}
    else if(id==='nextD'){if(state.day<6){state.day++;render();}}
    else if(id==='compW')completeWeek();
    else if(id==='logSess')logSession();
    else if(id==='timerTog')toggleTimer();
    else if(id==='timerRes')resetTimer();
    else if(id==='addW')openWordModal();
    else if(id==='lexAdd')openWordModal();
    else if(id==='lexExpJ')exportLexicon('json');
    else if(id==='lexExpC')exportLexicon('csv');
    else if(id==='loadShadow')loadShadowVideo();
    else if(id==='recBtn')simulateRecord();
    else if(id==='playRec')playRecording();
    else if(id==='copyAI')copyAIPrompt();
    else if(id==='cntW')countWords();
    else if(id==='newEx')genGrammarEx();
    else if(id==='chkAns')checkGrammarAns();
    else if(id==='startSRS')startSRS();
    else if(id==='expAll')exportFullBackup();
    else if(id==='rstAll'){state.modal='confirm';renderModals();}
    else if(id==='setGoal'){state.settings.dailyGoal=parseInt(e.target.value);save();}
    else if(id==='setNew'){state.settings.newCards=parseInt(e.target.value);save();}
    else if(id==='setTarget'){state.settings.target=e.target.value;save();}
    else if(id==='setTheme'){state.settings.theme=e.target.value;applyTheme();}
    else if(id==='impFile'){importBackup(e.target);}
    else if(id==='wForm'){e.preventDefault();saveWord();}
    else if(id==='fetchW'){fetchWordDef();}
    else if(id==='sessTimerD'){} // Timer display
  };

  // Inputs with debounce
  ['lexS','vocabS'].forEach(id=>{const el=$(id);if(el)el.oninput=debounce(()=>{state[id==='lexS'?'lexSearch':''] = el.value; render();},300);});
  
  // Global Keys
  document.onkeydown=e=>{
    if(state.modal){if(e.key==='Escape')closeModal();return;}
    if(state.srsActive&&['1','2','3','4'].includes(e.key)){const m={1:0,2:3,3:4,4:5};answerSRS(m[e.key]);}
    if(e.key===' '&&state.tab==='shadowing'){e.preventDefault();const v=$('#shadow-video');if(v)v.paused?v.play():v.pause();}
    if(['ArrowLeft','ArrowRight'].includes(e.key)&&state.tab==='shadowing'){const v=$('#shadow-video');if(v)v.currentTime+=e.key==='ArrowRight'?5:-5;}
    if(e.key==='s'&&state.tab==='shadowing'){const v=$('#shadow-video');if(v)v.currentTime=Math.max(0,v.currentTime-3);}
  };

  // Grammar input capture
  document.addEventListener('input',e=>{if(e.target.matches('[data-ans]'))window.gramAns[e.target.dataset.ans]=e.target.value;});
  document.addEventListener('change',e=>{if(e.target.matches('input[type="radio"][data-ans]'))window.gramAns[e.target.dataset.ans]=e.target.value;});
}

// Navigation
function setView(v){state.view=v;state.sidebarOpen=false;render();}
function enterClassroom(){state.day=G.todayDay();state.tab='day';setView('classroom');}

// Checks
function toggleCheck(k,v){const key=`c${state.week}d${state.day}`;if(!state.checks[key])state.checks[key]={srs:0,input:0,output:0,grammar:0,task0:0,task1:0,task2:0};state.checks[key][k]=v?1:0;save();render();}
function logSession(){
  const c=state.checks[`c${state.week}d${state.day}`];
  const core=CHECKLIST_KEYS.every(k=>c[k]);
  const tasks=DAY_LESSONS[state.day-1]?.tasks.every((_,i)=>c[`task${i}`]);
  if(!core&&!tasks){toast('Complete core or day tasks first!','warn');return;}
  const m=state.settings.dailyGoal;
  state.totalMin+=m;
  state.log.push({d:new Date().toISOString(),w:state.week,day:state.day,t:'full',m});
  state.lastActive=new Date().toISOString();
  calcStreak();save();

// Timer
function startTimer(s){state.timerSec=s;state.timerMode=s===1500?'pomodoro':'deep';state.timerRun=true;clearInterval(state.timerInt);state.timerInt=setInterval(()=>{if(state.timerSec>0)state.timerSec--;else{state.timerRun=false;clearInterval(state.timerInt);toast('Timer done!');}updateTimerUI();},1000);updateTimerUI();}
function toggleTimer(){if(state.timerRun){state.timerRun=false;clearInterval(state.timerInt);}else{if(state.timerSec<=0)return;state.timerRun=true;state.timerInt=setInterval(()=>{if(state.timerSec>0)state.timerSec--;else{state.timerRun=false;clearInterval(state.timerInt);}updateTimerUI();},1000);}updateTimerUI();}
function resetTimer(){state.timerRun=false;clearInterval(state.timerInt);state.timerSec=1500;state.timerMode='pomodoro';updateTimerUI();}
function updateTimerUI(){const d=$('#timerD'),m=$('#timerM'),c=$('.progress-bar');if(d)d.textContent=G.timerDisp();if(m)m.textContent=state.timerMode==='pomodoro'?'Pomodoro':'Deep Work';if(c)c.style.strokeDashoffset=377-(377*G.timerProg()/100);}

// SRS
function initSRS(){return{due:Date.now(),ivl:0,ef:2.5,rep:0,lps:0,st:0};}
function sched(srs,g){if(g===0){srs.ivl=0;srs.rep=0;srs.lps++;srs.st=1;srs.due=Date.now()+6e4;srs.ef=Math.max(1.3,srs.ef-0.2);return;}srs.rep++;if(srs.st===0){srs.st=1;srs.ivl=g===3?18e4:g===4?6e5:3.6e6;}else if(srs.st===1){srs.st=2;srs.ivl=g===3?6e5:g===4?8.64e7:3.456e8;}else{srs.ivl=Math.round(g===3?srs.ivl*1.2:g===4?srs.ivl*srs.ef:srs.ivl*srs.ef*1.3);}srs.due=Date.now()+srs.ivl;srs.ef+=0.1-(5-g)*(0.08+(5-g)*0.02);if(srs.ef<1.3)srs.ef=1.3;}
function startSRS(){state.srsQueue=state.words.filter(w=>w.srs&&w.srs.due<=Date.now()).sort((a,b)=>a.srs.due-b.srs.due);if(!state.srsQueue.length){toast('No cards due!');return;}state.srsIndex=0;state.srsActive=true;state.srsFlipped=false;setView('srs');}
function answerSRS(g){if(state.srsIndex>=state.srsQueue.length)return;const c=state.srsQueue[state.srsIndex];sched(c.srs,g);state.srsIndex++;state.srsFlipped=false;if(state.srsIndex>=state.srsQueue.length){state.srsActive=false;toast(`Done! Reviewed ${state.srsQueue.length} cards.`);save();}render();}

// Lexicon
async function fetchWordDef(){
  const hw=$('#wHw').value.trim();if(!hw)return;
  state.wordForm.loading=true;renderModals();
  try{
    const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(hw)}`);
    if(!res.ok)throw new Error('Not found');
    const d=await res.json();const e=d[0];const m=e.meanings[0];
    $('#wDef').value=m.definitions[0].definition;
    $('#wEx').value=m.definitions[0].example||'';
    $('#wIpa').value=e.phonetics.find(p=>p.text)?.text||e.phonetic||'';
    const aud=e.phonetics.find(p=>p.audio)?.audio;if(aud)$('#wTags').value=aud; // hack: reuse tags field for audio url in form
    state.wordForm.def=m.definitions[0].definition;state.wordForm.ex=m.definitions[0].example||'';state.wordForm.ipa=e.phonetics.find(p=>p.text)?.text||e.phonetic||'';state.wordForm.audio=aud||'';
    toast('Fetched!');
  }catch(e){toast('API Error: '+e.message,'error');}
  finally{state.wordForm.loading=false;renderModals();}
}
function saveWord(){
  const hw=$('#wHw').value.trim(),def=$('#wDef').value.trim();
  if(!hw||!def){toast('Headword & Def required','error');return;}
  const data={headword:hw,ipa:$('#wIpa').value.trim(),def,ex:$('#wEx').value.trim(),type:$('#wType').value,level:$('#wLvl').value,status:$('#wSts').value,tags:$('#wTags').value.split(',').map(t=>t.trim()).filter(t=>t),audio:$('#wTags').value}; // audio hack
  if(state.editId){const i=state.words.findIndex(x=>x.id===state.editId);if(i>-1)state.words[i]={...state.words[i],...data};toast('Updated');}
  else{state.words.push({id:crypto.randomUUID(),...data,srs:initSRS()});toast('Added to SRS');}
  closeModal();save();render();
}
function deleteWord(id){if(confirm('Delete?')){state.words=state.words.filter(w=>w.id!==id);save();toast('Deleted');render();}}
function exportLexicon(f){if(f==='json')download(new Blob([JSON.stringify(state.words,null,2)],{type:'application/json'}),'lexicon.json');else{const h='ID,Headword,IPA,Def,Ex,Type,Level,Status,Tags,Audio\n';const r=state.words.map(w=>`"${w.id}","${w.headword}","${w.ipa}","${w.def.replace(/"/g,'""')}","${w.ex.replace(/"/g,'""')}","${w.type}","${w.level}","${w.status}","${w.tags.join(';')}","${w.audio||''}"`).join('\n');download(new Blob([h+r],{type:'text/csv'}),'lexicon.csv');}toast(`Exported ${state.words.length} words`);}

function loadShadowVideo(){const url=$('#shadowUrl')?.value;const m=url?.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([\w-]{11})/);if(!m){toast('Invalid URL','error');return;}state.shadowId=m[1];state.shadowSegs=[{t:0,txt:'Welcome to this presentation.'},{t:5,txt:'Today we discuss consistent practice.'},{t:12,txt:'Shadowing improves fluency.'},{t:20,txt:'Repeat with short delay.'},{t:28,txt:'Trains real-time processing.'}];state.shadowIdx=0;toast('Loaded! Use keys: Space, Arrows, S, N, P');render();}

async function simulateRecord(){

function copyAIPrompt(){const w=G.cw();const t=`Act as C2 Examiner.\nTASK: ${w.o}\nVOCAB: ${w.w.slice(0,10).join(', ')}\nTEXT: ${$('#wrtTxt').value||'[PASTE]'}\n\n1. CORRECTED\n2. LEXICAL UPGRADES (3)\n3. GRAMMAR FOCUS (1)\n4. COHESION\n5. CEFR ESTIMATE`;navigator.clipboard.writeText(t);toast('Copied!');}

// Grammar Lab
window.gramType='cloze';window.gramData=null;window.gramAns={};
function genGrammarEx(){
  const w=G.cw(),v=w.w.slice(0,10),t=window.gramType;
  let d={type:t,items:[]};
  if(t==='cloze')d.items=v.map((w,i)=>{const s=`Sample sentence with ${w}.`;const p=s.split(w);return{id:i,w,b:p[0],a:p[1]||''};});
  else if(t==='transform')d.items=v.slice(0,6).map((w,i)=>{const k=w.split(' ')[0];return{id:i,p:`Rewrite using "${k}":`,s:`The project was completed by the team.`,k,ans:`The team successfully ${k} the project.`};});
  else if(t==='mcq')d.items=v.slice(0,6).map((w,i)=>{const d=v.filter((_,j)=>j!==i).slice(0,3);const o=[w,...d].sort(()=>Math.random()-0.5);return{id:i,q:'Which fits?',o,ans:w};});
  else if(t==='wordform'){const r=['mitigate','analyze','sustain','innovate','evaluate','communicate'];d.items=r.slice(0,6).map((r,i)=>{const f={n:r+'tion',v:r,adj:r+'ive',adv:r+'ively'};const tg=['n','v','adj','adv'][Math.floor(Math.random()*4)];return{id:i,r,t:tg,s:`We need a comprehensive ${r}___ of the data.`,ans:f[tg]};});}
  window.gramData=d;window.gramAns={};renderGrammarUI();$('#chkAns').disabled=false;
}
function renderGrammarUI(){
  const c=$('#gramEx');if(!c||!window.gramData)return;
  const d=window.gramData;let h='';
  if(d.type==='cloze')h=d.items.map(q=>`<div class="exercise"><p>${esc(q.b)}<input class="fill" data-ans="${q.id}" placeholder="..." style="min-width:${Math.max(100,q.w.length*8)}px">${esc(q.a)}</p><div id="fb-${q.id}" style="font-size:0.8rem;margin-top:0.25rem;height:1.2rem"></div></div>`).join('');
  else if(d.type==='transform')h=d.items.map(q=>`<div class="exercise"><p>${esc(q.p)}</p><p class="meta">"${esc(q.s)}"</p><input class="fill" style="width:100%" data-ans="${q.id}" placeholder="Your sentence..."><div id="fb-${q.id}" style="font-size:0.8rem;margin-top:0.25rem;height:1.2rem"></div></div>`).join('');
  else if(d.type==='mcq')h=d.items.map(q=>`<div class="exercise"><p>${esc(q.q)}</p><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem">${q.o.map(o=>`<label style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem;border:1px solid var(--border);border-radius:6px;cursor:pointer"><input type="radio" name="mcq_${q.id}" value="${esc(o)}" data-ans="${q.id}">${esc(o)}</label>`).join('')}</div><div id="fb-${q.id}" style="font-size:0.8rem;margin-top:0.25rem;height:1.2rem"></div></div>`).join('');
  else if(d.type==='wordform')h=d.items.map(q=>`<div class="exercise"><p>Root: <strong style="color:var(--primary)">${esc(q.r)}</strong> → Form: <strong>${['Noun','Verb','Adjective','Adverb'][['n','v','adj','adv'].indexOf(q.t)]}</strong></p><p class="meta">${esc(q.s.replace('___','____'))}</p><input class="fill" style="width:100%" data-ans="${q.id}" placeholder="e.g., mitigation"><div id="fb-${q.id}" style="font-size:0.8rem;margin-top:0.25rem;height:1.2rem"></div></div>`).join('');
  c.innerHTML=h;
}
function checkGrammarAns(){if(!window.gramData)return;let ok=0;const d=window.gramData;d.items.forEach(q=>{const a=window.gramAns[q.id];const f=$(`#fb-${q.id}`);let c=false;if(d.type==='transform')c=norm(a)===norm(q.ans);else c=a===q.ans;if(f){f.textContent=c?'✓ Correct':'✗ '+ (q.ans||q.w);f.style.color=c?'var(--success)':'var(--danger)';}if(c)ok++;});toast(`Score: ${ok}/${d.items.length}`,ok===d.items.length?'success':'info');}
function norm(s){return String(s||'').toLowerCase().replace(/[.,!?]/g,'').trim();}
