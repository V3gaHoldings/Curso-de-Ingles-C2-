// --- 9. EVENT BINDING ---
function bindEvents() {
  // Navigation
  $$('[data-view]').forEach(el=>el.onclick=e=>{e.preventDefault(); setView(e.currentTarget.dataset.view);});
  $$('[data-tab]').forEach(el=>el.onclick=e=>{ state.activeClassroomTab=e.currentTarget.dataset.tab; render(); });
  $$('[data-phase]').forEach(el=>el.onclick=e=>{ state.curriculumFilter=parseInt(e.currentTarget.dataset.phase)||e.currentTarget.dataset.phase; render(); });
  $$('[data-filter]').forEach(el=>el.onclick=e=>{ state.lexiconFilter=e.currentTarget.dataset.filter; render(); });
  $$('[data-action]').forEach(el=>el.onclick=e=>openSessionModal(e.currentTarget.dataset.action));
  $$('[data-check]').forEach(el=>el.onchange=e=>{ saveDailyCheck(e.target.dataset.check, e.target.checked); });
  $$('[data-play]').forEach(el=>{ const url=el.dataset.play; if(url) el.onclick=()=>new Audio(url).play(); });
  $$('[data-edit]').forEach(el=>el.onclick=e=>openWordModal(e.currentTarget.dataset.edit));
  $$('[data-delete]').forEach(el=>el.onclick=e=>{ if(confirm('Delete permanently?')) deleteWord(e.currentTarget.dataset.delete); });
  $$('[data-add-word]').forEach(el=>el.onclick=e=>{ openWordModal(); setTimeout(()=>{$('#wHeadword').value=e.currentTarget.dataset.addWord; fetchWordData();}, 100); });
  $$('[data-week]').forEach(el=>el.onclick=e=>openWeekModal(parseInt(e.currentTarget.dataset.week)));
  $$('[data-seek]').forEach(el=>el.onclick=e=>seekShadow(parseInt(e.currentTarget.dataset.seek)));
  $$('[data-speak]').forEach(el=>el.onclick=e=>speakShadow(parseInt(e.currentTarget.dataset.speak)));
  $$('[data-ex-type]').forEach(el=>el.onclick=e=>{ window.grammarExerciseType=e.currentTarget.dataset.exType; generateGrammarExercise(); });
  $$('.sr-btn[data-grade]').forEach(b=>b.onclick=()=>answerSRS(parseInt(b.dataset.grade)));
  $$('[data-dismiss]').forEach(b=>b.onclick=e=>{ state.toasts.splice(parseInt(e.currentTarget.dataset.dismiss),1); render(); });

  // Buttons
  $('#btnEnterClass')?.onclick=enterClassroom;
  $('#prevDay')?.onclick=()=>{if(state.classroomDay>1){state.classroomDay--;render();}};
  $('#nextDay')?.onclick=()=>{if(state.classroomDay<6){state.classroomDay++;render();}};
  $('#completeWeek')?.onclick=completeWeek;
  $('#logSession')?.onclick=logSession;
  $$('[data-timer]').forEach(b=>b.onclick=e=>startTimer(parseInt(e.currentTarget.dataset.timer)));
  $('#timerToggle')?.onclick=toggleTimer;
  $('#timerReset')?.onclick=resetTimer;
  $('#mobileMenuBtn')?.onclick=()=>{state.mobileMenuOpen=!state.mobileMenuOpen;render();};
  $('#mobileOverlay')?.onclick=()=>{state.mobileMenuOpen=false;render();};
  $('#sidebar a')?.onclick=()=>{state.sidebarOpen=false;state.mobileMenuOpen=false;}; // Close on nav click

  // Lexicon
  $('#lexiconSearch')?.oninput=debounce(()=>{state.lexiconSearch=$('#lexiconSearch').value;render();},300);
  $('#btnAddWord')?.onclick=()=>openWordModal();
  $('#btnExportJson')?.onclick=()=>exportLexicon('json');
  $('#btnExportCsv')?.onclick=()=>exportLexicon('csv');
  $('#vocabSearch')?.oninput=debounce(()=>{render();},300); // Re-render vocab lab list
  $('#addWordFromList')?.onclick=()=>openWordModal();

  // Shadowing
  $('#loadShadowVideo')?.onclick=loadShadowVideo;
  $('#shadowUrl')?.onkeypress=e=>{if(e.key==='Enter')loadShadowVideo();};

  // Output
  $('#startRecording')?.onclick=startRecording;
  $('#playRecording')?.onclick=playRecording;
  $('#copyAIPrompt')?.onclick=copyAIPrompt;
  $('#countWords')?.onclick=countWords;

  // Grammar
  $('#newExercise')?.onclick=generateGrammarExercise;
  $('#checkAnswers')?.onclick=checkGrammarAnswers;

  // SRS
  $('#startSRS')?.onclick=startSRS;
  $('#srsFlipCard')?.onclick=e=>{if(e.target.closest('.flip-card')) e.target.closest('.flip-card').classList.toggle('flipped');};

  // Settings
  $('#setDailyGoal')?.onchange=e=>{state.settings.dailyGoal=parseInt(e.target.value);saveState();};
  $('#setNewCards')?.onchange=e=>{state.settings.newCardsDay=parseInt(e.target.value);saveState();};
  $('#setTargetLevel')?.onchange=e=>{state.settings.targetLevel=e.target.value;saveState();};
  $('#setTheme')?.onchange=e=>{state.settings.theme=e.target.value;applyTheme();};
  $('#btnExportAll')?.onclick=exportFullBackup;
  $('#importFile')?.onchange=e=>importBackup(e);
  $('#btnResetAll')?.onclick=confirmReset;

  // Global Keys
  document.onkeydown = handleGlobalKeys;
}

// --- 10. CORE LOGIC FUNCTIONS ---

// Navigation
function setView(view) { state.currentView=view; state.sidebarOpen=false; state.mobileMenuOpen=false; render(); }
function enterClassroom() { state.classroomDay=getters.todayDay(); state.activeClassroomTab='day'; setView('classroom'); }
function prevDay() { if(state.classroomDay>1){state.classroomDay--;render();} }
function nextDay() { if(state.classroomDay<6){state.classroomDay++;render();} }
function completeWeek() { if(!state.completedWeeks.includes(state.currentWeek)) state.completedWeeks.push(state.currentWeek); if(state.currentWeek<26) state.currentWeek++; state.classroomDay=1; saveState(); toast(`Week ${state.currentWeek-1} completed!`, 'success'); render(); }

// Daily Checks
function saveDailyCheck(key, val) { const k=`checks_w${state.currentWeek}_d${state.classroomDay}`; if(!state.dailyChecks[k]) state.dailyChecks[k]={srs:false,input:false,output:false,grammar:false,task0:false,task1:false,task2:false}; state.dailyChecks[k][key]=val; saveState(); render(); }
function logSession() { const k=`checks_w${state.currentWeek}_d${state.classroomDay}`; const c=state.dailyChecks[k]; if(!c||!Object.values(c).every(v=>v)){toast('Complete all 4 tasks first!','warn');return;} const mins=state.settings.dailyGoal; state.totalMinutes+=mins; state.sessionLog.push({date:new Date().toISOString(),week:state.currentWeek,day:state.classroomDay,type:'full',minutes:mins}); state.lastActive=new Date().toISOString(); calculateStreak(); saveState(); toast(`Logged ${mins} min session!`, 'success'); if(state.classroomDay<6) nextDay(); render(); }

// Timer
function startTimer(secs) { state.timerSeconds=secs; state.timerMode=secs===1500?'Pomodoro':'Deep Work'; state.timerRunning=true; clearInterval(state.timerInterval); state.timerInterval=setInterval(()=>{if(state.timerSeconds>0)state.timerSeconds--;else{state.timerRunning=false;clearInterval(state.timerInterval);toast('Timer complete!','success');} updateTimerUI();},1000); updateTimerUI(); }
function toggleTimer() { if(state.timerRunning){state.timerRunning=false;clearInterval(state.timerInterval);}else{if(state.timerSeconds<=0)return;state.timerRunning=true;state.timerInterval=setInterval(()=>{if(state.timerSeconds>0)state.timerSeconds--;else{state.timerRunning=false;clearInterval(state.timerInterval);}updateTimerUI();},1000);} updateTimerUI(); }
function resetTimer() { state.timerRunning=false; clearInterval(state.timerInterval); state.timerSeconds=1500; state.timerMode='Pomodoro'; updateTimerUI(); }
function updateTimerUI() { const d=$('#timerDisplay'); if(d) d.textContent=getters.timerDisplay(); const t=$('#timerToggle'); if(t) t.innerHTML=`<i data-lucide="${state.timerRunning?'pause':'play'}" class="w-4 h-4 mr-1"></i> ${state.timerRunning?'Pause':'Resume'}`; const circle=$('.progress-ring-circle'); if(circle) circle.style.strokeDashoffset = 377 - (377 * getters.timerProgress() / 100); lucide.createIcons(); }

// SRS
function initSRS() { return {due:Date.now(),interval:0,ease:2.5,reps:0,lapses:0,state:0}; }
function scheduleCard(srs, grade) { if(grade===0){srs.interval=0;srs.reps=0;srs.lapses++;srs.state=1;srs.due=Date.now()+60000;srs.ease=Math.max(1.3,srs.ease-0.2);return;} srs.reps++; if(srs.state===0){srs.state=1;srs.interval=grade===3?3*60000:grade===4?10*60000:1*3600000;} else if(srs.state===1){srs.state=2;srs.interval=grade===3?10*60000:grade===4?1*86400000:4*86400000;} else {srs.interval=Math.round(grade===3?srs.interval*1.2:grade===4?srs.interval*srs.ease:srs.interval*srs.ease*1.3);} srs.due=Date.now()+srs.interval; srs.ease+=(0.1-(5-grade)*(0.08+(5-grade)*0.02)); if(srs.ease<1.3)srs.ease=1.3; }
function startSRS() { state.srsQueue=state.words.filter(w=>w.srs&&w.srs.due<=Date.now()).sort((a,b)=>a.srs.due-b.srs.due); if(!state.srsQueue.length){toast('No cards due!','info');return;} state.srsIndex=0; state.srsActive=true; setView('srs'); }
function answerSRS(grade) { if(state.srsIndex>=state.srsQueue.length) return; const card=state.srsQueue[state.srsIndex]; scheduleCard(card.srs,grade); state.srsIndex++; if(state.srsIndex>=state.srsQueue.length){state.srsActive=false;toast(`Session complete! Reviewed ${state.srsQueue.length} cards.`,'success');saveState();} render(); }

// Lexicon
async function fetchWordData() { const hw=$('#wHeadword').value.trim(); if(!hw) return; state.wordForm.loading=true; state.wordForm.apiError=''; renderModals(); try{ const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(hw)}`); if(!res.ok) throw new Error('Not found'); const data=await res.json(); const entry=data[0]; const mean=entry.meanings[0]; $('#wDef').value=mean.definitions[0].definition; $('#wEx').value=mean.definitions[0].example||''; $('#wIpa').value=entry.phonetics.find(p=>p.text)?.text||entry.phonetic||''; const audio=entry.phonetics.find(p=>p.audio)?.audio; if(audio) $('#wAudioUrl').value=audio; state.wordForm.def=mean.definitions[0].definition; state.wordForm.ex=mean.definitions[0].example||''; state.wordForm.ipa=entry.phonetics.find(p=>p.text)?.text||entry.phonetic||''; state.wordForm.audioUrl=audio||''; toast('Definition & Audio fetched!','success');}catch(e){state.wordForm.apiError='Word not found in free dictionary. Enter manually.';toast('API Error: '+e.message,'error');}finally{state.wordForm.loading=false;renderModals();} }
function saveWord(e) { e.preventDefault(); if(!$('#wHeadword').value.trim()||!$('#wDef').value.trim()){toast('Headword & Definition required','error');return;} const data={headword:$('#wHeadword').value.trim(),ipa:$('#wIpa').value.trim(),def:$('#wDef').value.trim(),ex:$('#wEx').value.trim(),type:$('#wType').value,level:$('#wLevel').value,status:$('#wStatus').value,tags:$('#wTags').value.split(',').map(t=>t.trim()).filter(t=>t),audioUrl:$('#wAudioUrl').value}; if(state.editingWordId){const i=state.words.findIndex(x=>x.id===state.editingWordId); if(i>-1) state.words[i]={...state.words[i],...data}; toast('Word updated','success');} else { state.words.push({id:crypto.randomUUID(),...data,srs:initSRS()}); toast('Word added to Lexicon & SRS','success');} closeWordModal(); saveState(); render(); }
function deleteWord(id) { if(confirm('Delete permanently?')){state.words=state.words.filter(w=>w.id!==id);saveState();toast('Deleted','info');render();} }
function exportLexicon(fmt) { if(fmt==='json'){downloadBlob(new Blob([JSON.stringify(state.words,null,2)],{type:'application/json'}),'lexicon.json');} else { const headers='ID,Headword,IPA,Definition,Example,Type,Level,Status,Tags,AudioURL\n'; const rows=state.words.map(w=>`"${w.id}","${w.headword}","${w.ipa}","${w.def.replace(/"/g,'""')}","${w.ex.replace(/"/g,'""')}","${w.type}","${w.level}","${w.status}","${w.tags.join(';')}","${w.audioUrl}"`).join('\n'); downloadBlob(new Blob([headers+rows],{type:'text/csv'}),'lexicon.csv');} toast(`Exported ${state.words.length} words as ${fmt.toUpperCase()}`,'success'); }

// Curriculum
function startWeekSession(num) { state.currentWeek=num; saveState(); closeWeekModal(); enterClassroom(); }
function toggleWeekComplete(num) { const i=state.completedWeeks.indexOf(num); if(i>-1) state.completedWeeks.splice(i,1); else state.completedWeeks.push(num); if(num===state.currentWeek&&i===-1&&state.currentWeek<26) state.currentWeek++; saveState(); closeWeekModal(); render(); }

// Shadowing
let shadowPlayer = null;
function loadShadowVideo() { const url=$('#shadowUrl').value; const match=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([\w-]{11})/); if(!match){toast('Invalid YouTube URL','error');return;} window.shadowVideoId=match[1]; window.shadowSegments=[{time:0,text:"Welcome to this presentation about language learning."},{time:5,text:"Today we will discuss the importance of consistent practice."},{time:12,text:"Shadowing is a powerful technique to improve fluency."},{time:20,text:"You repeat what you hear with a very short delay."},{time:28,text:"This trains your brain to process English in real time."}]; window.shadowCurrentSeg=0; toast('Video loaded! Use keyboard shortcuts.','success'); render(); }
function seekShadow(i) { window.shadowCurrentSeg=i; const vid=$('#shadow-video'); if(vid) vid.contentWindow.postMessage(JSON.stringify({event:'command',func:'seekTo',args:[window.shadowSegments[i].time,true]}),'*'); render(); }
function speakShadow(i) { if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(window.shadowSegments[i].text);u.lang='en-US';u.rate=0.9;speechSynthesis.speak(u);} }

// Output
let mediaRecorder=null, audioChunks=[], audioBlob=null, audioUrl='';
async function startRecording() { const btn=$('#startRecording'); if(btn.textContent.includes('Recording')){mediaRecorder.stop();return;} try{const stream=await navigator.mediaDevices.getUserMedia({audio:true}); mediaRecorder=new MediaRecorder(stream); audioChunks=[]; mediaRecorder.ondataavailable=e=>audioChunks.push(e.data); mediaRecorder.onstop=()=>{audioBlob=new Blob(audioChunks,{type:'audio/webm'});audioUrl=URL.createObjectURL(audioBlob);btn.innerHTML=`<i data-lucide="mic" class="w-4 h-4 mr-1"></i> Start 2-min Recording`;btn.classList.remove('bg-red-600');$('#playRecording').disabled=false;$('#saveRecording').classList.remove('hidden');$('#saveRecording').href=audioUrl;$('#saveRecording').download='speaking-practice.webm';stream.getTracks().forEach(t=>t.stop());toast('Recording saved!','success');lucide.createIcons();}; mediaRecorder.start(); btn.innerHTML=`<i data-lucide="mic" class="w-4 h-4 mr-1"></i> Recording (2 min)...`; btn.classList.add('bg-red-600'); setTimeout(()=>{if(mediaRecorder.state==='recording')mediaRecorder.stop();},120000);}catch(e){toast('Mic permission denied','error');} }
function playRecording() { if(audioUrl) new Audio(audioUrl).play(); }
function copyAIPrompt() { const w=getters.currentWeekData(); const words=w.words.slice(0,10).join(', '); const prompt=`Act as a C2 Cambridge Examiner. Analyze my text below.
TASK: ${w.output}
TARGET VOCAB: ${words}
MY TEXT:
${$('#writingText').value||'[PASTE YOUR WRITING HERE]'}

PROVIDE:
1. CORRECTED VERSION (Track changes style: [[incorrect]] → {{correct}})
2. LEXICAL UPGRADES: 3 specific collocations/phrases to replace basic vocabulary.
3. GRAMMAR FOCUS: 1 pattern to review (with explanation).
4. COHESION: Feedback on flow, connectors, paragraphing.
5. ESTIMATED CEFR LEVEL & IELTS/CAE/CPE Band Equivalent.`; navigator.clipboard.writeText(prompt); toast('Prompt copied! Paste into ChatGPT/Claude.','success'); }
function countWords() { const c=$('#writingText').value.trim().split(/\s+/).filter(w=>w).length; toast(`Word count: ${c}`,'info'); }

// Grammar Lab
window.grammarExerciseType = 'cloze';
window.grammarExerciseData = null;
window.grammarUserAnswers = {};
function generateGrammarExercise() { const w=getters.currentWeekData(); const vocab=w.words.slice(0,10); const t=window.grammarExerciseType; let data={type:t,items:[]}; if(t==='cloze'){data.items=vocab.map((v,i)=>{const sent=`This is a sample sentence using the target word ${v}.`; const p=sent.split(v); return{id:i,word:v,before:p[0],after:p[1]||''};});} else if(t==='transform'){data.items=vocab.slice(0,6).map((v,i)=>{const kw=v.split(' ')[0]; return{id:i,prompt:`Rewrite using "${kw}":`,sentence:`The project was completed by the team successfully.`,key:kw,answer:`The team successfully ${kw} the project.`};});} else if(t==='mcq'){data.items=vocab.slice(0,6).map((v,i)=>{const d=vocab.filter((_,j)=>j!==i).slice(0,3); const o=[v,...d].sort(()=>Math.random()-0.5); return{id:i,question:`Which word fits best?`,options:o,answer:v};});} else if(t==='wordform'){const roots=['mitigate','analyze','sustain','innovate','evaluate','communicate']; data.items=roots.slice(0,6).map((r,i)=>{const f={n:r+'tion',v:r,adj:r+'ive',adv:r+'ively'}; const tgt=['n','v','adj','adv'][Math.floor(Math.random()*4)]; return{id:i,root:r,target:tgt,sentence:`We need a comprehensive ${r}___ of the data.`,answer:f[tgt]};});} window.grammarExerciseData=data; window.grammarUserAnswers={}; renderGrammarExerciseUI(); $('#checkAnswers').disabled=false; }
function renderGrammarExerciseUI() { const cont=$('#grammarExerciseContainer'); if(!cont||!window.grammarExerciseData) return; const data=window.grammarExerciseData; let html=''; if(data.type==='cloze') html=data.items.map(q=>`<div class="exercise-box"><p class="text-gray-300">${escapeHtml(q.before)}<input type="text" class="fill-input" data-ans="${q.id}" placeholder="..." style="min-width:${Math.max(120,q.word.length*10)}px">${escapeHtml(q.after)}</p><div id="fb-${q.id}" class="text-sm mt-1 hidden"></div></div>`).join(''); else if(data.type==='transform') html=data.items.map(q=>`<div class="exercise-box"><p class="text-gray-300 mb-2">${escapeHtml(q.prompt)}</p><p class="text-gray-500 italic mb-2">"${escapeHtml(q.sentence)}"</p><input type="text" class="fill-input w-full" data-ans="${q.id}" placeholder="Your sentence..."><div id="fb-${q.id}" class="text-sm mt-1 hidden"></div></div>`).join(''); else if(data.type==='mcq') html=data.items.map(q=>`<div class="exercise-box"><p class="text-gray-300 mb-2">${escapeHtml(q.question)}</p><div class="grid gap-2 sm:grid-cols-2">${q.options.map(o=>`<label class="flex items-center gap-2 p-2 rounded-lg border border-gray-700 hover:bg-gray-800 cursor-pointer"><input type="radio" name="mcq_${q.id}" value="${escapeHtml(o)}" data-ans="${q.id}"><span>${escapeHtml(o)}</span></label>`).join('')}</div><div id="fb-${q.id}" class="text-sm mt-1 hidden"></div></div>`).join(''); else if(data.type==='wordform') html=data.items.map(q=>`<div class="exercise-box"><p class="text-gray-300">Root: <strong class="text-cyan-400">${escapeHtml(q.root)}</strong> → Form: <strong>${['Noun','Verb','Adjective','Adverb'][['n','v','adj','adv'].indexOf(q.target)]}</strong></p><p class="text-gray-500 italic mb-2">${escapeHtml(q.sentence.replace('___','____'))}</p><input type="text" class="fill-input w-full" data-ans="${q.id}" placeholder="e.g., mitigation"><div id="fb-${q.id}" class="text-sm mt-1 hidden"></div></div>`).join(''); cont.innerHTML=html; lucide.createIcons(); }
function checkGrammarAnswers() { if(!window.grammarExerciseData) return; let correct=0; window.grammarExerciseData.items.forEach(q=>{ const ans=window.grammarUserAnswers[q.id]; const fb=$(`#fb-${q.id}`); let ok=false; if(data.type==='transform') ok=normalize(ans)===normalize(q.answer); else ok=ans===q.answer; if(fb){fb.textContent=ok?'✓ Correct':'✗ Answer: '+(q.answer||q.word); fb.className='text-sm mt-1 '+(ok?'text-green-400':'text-red-400'); fb.classList.remove('hidden');} if(ok) correct++; }); toast(`Score: ${correct}/${window.grammarExerciseData.items.length}`, correct===window.grammarExerciseData.items.length?'success':'info'); }
// Capture grammar inputs
document.addEventListener('input', e=>{ if(e.target.matches('[data-ans]')) window.grammarUserAnswers[e.target.dataset.ans]=e.target.value; });
document.addEventListener('change', e=>{ if(e.target.matches('input[type="radio"][data-ans]')) window.grammarUserAnswers[e.target.dataset.ans]=e.target.value; });
function normalize(s){return String(s||'').toLowerCase().replace(/[.,!?]/g,'').trim();}

// Session Modal Timer
function startSessionTimer() { clearInterval(state.sessionTimerInterval); state.sessionTimerInterval=setInterval(()=>{state.sessionTimerSeconds--; if(state.sessionTimerSeconds<=0){clearInterval(state.sessionTimerInterval);toast('Time up! Log session.','success');} updateSessionTimerUI();},1000); }
function updateSessionTimerUI() { const d=$('#sessionTimerDisplay'); if(d){const m=String(Math.floor(state.sessionTimerSeconds/60)).padStart(2,'0'); const s=String(state.sessionTimerSeconds%60).padStart(2,'0'); d.textContent=`${m}:${s}`;} }

// Settings
function saveState() { const toSave={currentView:state.currentView,currentWeek:state.currentWeek,streak:state.streak,lastActive:state.lastActive,totalMinutes:state.totalMinutes,words:state.words,sessionLog:state.sessionLog,completedWeeks:state.completedWeeks,dailyChecks:state.dailyChecks,settings:state.settings,classroomDay:state.classroomDay,activeClassroomTab:state.activeClassroomTab,curriculumFilter:state.curriculumFilter,lexiconFilter:state.lexiconFilter,lexiconSearch:state.lexiconSearch}; localStorage.setItem('fluencyLab_v3',JSON.stringify(toSave)); }
function exportFullBackup() { const data={words:state.words,sessionLog:state.sessionLog,completedWeeks:state.completedWeeks,dailyChecks:state.dailyChecks,settings:state.settings,currentWeek:state.currentWeek,streak:state.streak,totalMinutes:state.totalMinutes,lastActive:state.lastActive}; downloadBlob(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),'fluency-lab-backup.json'); toast('Full backup exported','success'); }
function importBackup(e) { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{try{const p=JSON.parse(ev.target.result); Object.keys(p).forEach(k=>{if(!['navigation','classroomTabs','toolCategories','checklistItems','lexiconFilters','dayLessons'].includes(k)) state[k]=p[k];}); saveState(); applyTheme(); toast('Backup restored! Reloading...','success'); setTimeout(()=>location.reload(),1000);}catch(err){toast('Invalid file','error');}}; r.readAsText(f); e.target.value=''; }
function hardReset() { localStorage.removeItem('fluencyLab_v3'); location.reload(); }

// Toast
function toast(msg, type='info') { state.toasts.push({msg,type}); render(); setTimeout(()=>{state.toasts.shift();render();},5000); }

// Global Keys
function handleGlobalKeys(e) { if(state.showWordModal||state.showSessionModal||state.showWeekModal||state.showConfirmReset){if(e.key==='Escape'){closeWordModal();closeSessionModal();closeWeekModal();state.showConfirmReset=false;renderModals();}return;} if(state.srsActive&&['1','2','3','4'].includes(e.key)){const map={1:0,2:3,3:4,4:5};answerSRS(map[e.key]);} if(e.key===' '&&state.activeClassroomTab==='shadowing'){e.preventDefault();const vid=$('#shadow-video');if(vid)vid.paused?vid.play():vid.pause();} if(['ArrowLeft','ArrowRight'].includes(e.key)&&state.activeClassroomTab==='shadowing'){const vid=$('#shadow-video');if(vid)vid.currentTime+=e.key==='ArrowRight'?5:-5;} if(e.key==='s'&&state.activeClassroomTab==='shadowing'){const vid=$('#shadow-video');if(vid)vid.currentTime=Math.max(0,vid.currentTime-3);} }

// Helpers
function debounce(fn,ms){let t;return(...args)=>{clearTimeout(t);t=setTimeout(()=>fn(...args),ms);};}

// --- 11. INIT ---
window.app = { state, render, toast, openWordModal, closeWordModal, openSessionModal, closeSessionModal, openWeekModal, closeWeekModal, renderModals, saveState, loadState, applyTheme, startSRS, answerSRS, fetchWordData, saveWord, deleteWord, exportLexicon, startWeekSession, toggleWeekComplete, loadShadowVideo, seekShadow, speakShadow, startRecording, playRecording, copyAIPrompt, countWords, generateGrammarExercise, checkGrammarAnswers, startSessionTimer, exportFullBackup, importBackup, hardReset, saveDailyCheck, logSession, startTimer, toggleTimer, resetTimer, setView, enterClassroom, completeWeek, handleGlobalKeys };

loadState();
render();
console.log('Fluency Lab v3 Loaded. State:', state);
</script>
