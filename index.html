<style>
  :root { --bg:#0a0e17; --card:#111827; --border:#1f2937; --primary:#22d3ee; --accent:#f472b6; --text:#e5e7eb; --muted:#9ca3af; --success:#34d399; --warn:#fbbf24; --danger:#f87171; }
  .light { --bg:#f8fafc; --card:#ffffff; --border:#e2e8f0; --text:#0f172a; --muted:#64748b; --primary:#0891b2; --accent:#db2777; --success:#059669; --warn:#d97706; --danger:#dc2626; }
  * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  body { background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; margin: 0; min-height: 100vh; }
  .bg-grid { background-image: linear-gradient(to right, rgba(34,211,238,0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(34,211,238,0.04) 1px, transparent 1px); background-size: 50px 50px; }
  .light .bg-grid { background-image: linear-gradient(to right, rgba(8,145,178,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(8,145,178,0.05) 1px, transparent 1px); }
  .glass { background: rgba(17,24,39,0.7); backdrop-filter: blur(12px); border: 1px solid var(--border); }
  .light .glass { background: rgba(255,255,255,0.8); border: 1px solid var(--border); }
  .btn { padding: 0.625rem 1rem; border-radius: 0.75rem; font-weight: 500; transition: all 0.2s; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #111827; } .btn-primary:hover { background: #06b6d4; }
  .btn-secondary { background: #1f2937; color: #f9fafb; border: 1px solid #374151; } .btn-secondary:hover { background: #374151; }
  .light .btn-secondary { background: #f3f4f6; color: #111827; border-color: #d1d5db; } .light .btn-secondary:hover { background: #e5e7eb; }
  .btn-ghost { background: transparent; color: #9ca3af; } .btn-ghost:hover { background: #1f2937; color: #fff; }
  .light .btn-ghost:hover { background: #f3f4f6; color: #111827; }
  .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
  .btn-xs { padding: 0.25rem 0.5rem; font-size: 0.7rem; }
  .input-field { width: 100%; background: #111827; border: 1px solid #374151; border-radius: 0.75rem; padding: 0.75rem 1rem; color: #fff; outline: none; transition: border 0.2s, box-shadow 0.2s; }
  .light .input-field { background: #fff; border-color: #d1d5db; color: #111827; }
  .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(34,211,238,0.2); }
  .input-field::placeholder { color: #6b7280; }
  .card { background: rgba(17,24,39,0.7); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1rem; padding: 1.25rem; transition: border 0.2s; }
  .card:hover { border-color: rgba(34,211,238,0.3); }
  .nav-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.75rem; color: #9ca3af; font-weight: 500; transition: all 0.2s; text-decoration: none; }
  .nav-link:hover { color: #fff; background: rgba(31,41,55,0.5); }
  .light .nav-link:hover { color: #111827; background: #f3f4f6; }
  .nav-link.active { color: var(--primary); background: rgba(34,211,238,0.1); border-left: 2px solid var(--primary); }
  .tab-btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #9ca3af; background: transparent; border: none; cursor: pointer; transition: all 0.2s; }
  .tab-btn:hover { color: #fff; background: rgba(31,41,55,0.5); }
  .tab-btn.active { color: var(--primary); background: rgba(34,211,238,0.1); }
  .word-chip { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; background: #1f2937; border: 1px solid #374151; color: #d1d5db; cursor: pointer; transition: all 0.2s; }
  .word-chip:hover { border-color: rgba(34,211,238,0.5); }
  .word-chip.learned { background: rgba(16,185,129,0.1); border-color: #10b981; color: #34d399; }
  .word-chip.learning { background: rgba(251,191,36,0.1); border-color: #fbbf24; color: #fbbf24; }
  .light .word-chip { background: #f3f4f6; border-color: #d1d5db; color: #374151; }
  .light .word-chip.learned { background: #dcfce7; border-color: #10b981; color: #059669; }
  .light .word-chip.learning { background: #fef3c7; border-color: #fbbf24; color: #d97706; }
  .week-card { display: flex; flex-direction: column; height: 100%; position: relative; overflow: hidden; }
  .week-card.current { border-color: rgba(34,211,238,0.5); box-shadow: 0 0 20px rgba(34,211,238,0.1); }
  .week-card.done { opacity: 0.6; }
  .week-card.done::after { content:''; position: absolute; top: 0; right: 0; width: 2rem; height: 2rem; background: rgba(16,185,129,0.2); clip-path: polygon(100% 0, 100% 100%, 0 100%); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal-box { background: rgba(17,24,39,0.9); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 1.5rem; width: 100%; max-width: 48rem; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
  .sr-btn { padding: 0.5rem 1rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 600; min-width: 5rem; border: none; cursor: pointer; transition: all 0.2s; }
  .sr-again { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid #ef4444; } .sr-again:hover { background: #ef4444; color: white; }
  .sr-hard { background: rgba(249,115,22,0.2); color: #fb923c; border: 1px solid #f97316; } .sr-hard:hover { background: #f97316; color: white; }
  .sr-good { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid #10b981; } .sr-good:hover { background: #10b981; color: white; }
  .sr-easy { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid #3b82f6; } .sr-easy:hover { background: #3b82f6; color: white; }
  .exercise-box { background: rgba(17,24,39,0.5); border: 1px solid #374151; border-radius: 0.75rem; padding: 1rem; margin-bottom: 0.75rem; }
  .light .exercise-box { background: #f9fafb; border-color: #e5e7eb; }
  .fill-input { background: #1f2937; border: none; border-bottom: 2px solid #4b5563; color: #fff; padding: 0.5rem 0.75rem; border-radius: 0.25rem; outline: none; min-width: 8rem; text-align: center; transition: border 0.2s; }
  .light .fill-input { background: #fff; border-bottom-color: #d1d5db; color: #111827; }
  .fill-input:focus { border-bottom-color: var(--primary); }
  .fill-input.correct { border-bottom-color: #10b981; background: rgba(16,185,129,0.1); color: #34d399; }
  .fill-input.incorrect { border-bottom-color: #ef4444; background: rgba(239,68,68,0.1); color: #f87171; }
  .audio-btn { padding: 0.5rem; border-radius: 0.5rem; background: #1f2937; color: #9ca3af; border: none; cursor: pointer; transition: all 0.2s; }
  .audio-btn:hover { background: #374151; color: var(--primary); }
  .audio-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .light .audio-btn { background: #e5e7eb; color: #6b7280; } .light .audio-btn:hover { background: #d1d5db; color: var(--primary); }
  ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeInUp 0.4s ease-out forwards; }
  .flip-card { perspective: 1000px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
  .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
  .flip-card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; border-radius: 1rem; }
  .flip-card-back { transform: rotateY(180deg); background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); border: 1px solid #312e81; }
  .light .flip-card-back { background: linear-gradient(135deg, #e0e7ff 0%, #fafafa 100%); border: 1px solid #c7d2fe; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 60; display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; border-radius: 0.75rem; background: rgba(17,24,39,0.9); border: 1px solid var(--border); backdrop-filter: blur(12px); animation: fadeInUp 0.3s ease-out; }
  .toast.success { border-color: #10b981; } .toast.error { border-color: #ef4444; } .toast.warn { border-color: #fbbf24; }
  .error-screen { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(10,14,23,0.95); backdrop-filter: blur(8px); flex-direction: column; gap: 1rem; padding: 2rem; }
  .error-box { background: rgba(17,24,39,0.9); border: 1px solid #ef4444; border-radius: 1.5rem; padding: 2rem; max-width: 40rem; width: 100%; text-align: left; }
  .kbd { display: inline-block; padding: 0.125rem 0.5rem; background: #1f2937; border-radius: 0.25rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; border: 1px solid #374151; }
  .light .kbd { background: #f3f4f6; border-color: #d1d5db; }
</style>

<script>
// --- 1. DATA & CONFIG ---
const CURRICULUM = [
  {w:1, phase:1, theme:"Daily Life & Work Collocations", vocabFocus:"High-frequency verb+noun collocations (make/do/take/have/get)", grammar:"Present Perfect vs Past Simple", grammarDetail:`<h4>Present Perfect vs Past Simple</h4><p><strong>Present Perfect:</strong> Life experience, recent past (just/already/yet), unfinished time. <em>I've worked here for 5 years.</em></p><p><strong>Past Simple:</strong> Finished actions at specific time. <em>I worked there in 2019.</em></p><p><strong>Triggers:</strong> PP: ever, never, just, already, yet, since, for. PS: yesterday, last week, in 2020, ago.</p>`, input:"BBC 6 Minute English: 'The daily grind'", output:"Describe your typical workday using 10 collocations. Record 2 min.", words:["carry out", "come across", "deal with", "find out", "give up", "go on", "look for", "make sure", "point out", "set up", "take place", "work out", "break down", "bring up", "cut down", "run out of", "come up with", "get along", "look forward to", "take advantage of"]},
  {w:2, phase:1, theme:"Precise Personality Adjectives", vocabFocus:"Advanced adjectives + dependent prepositions", grammar:"Relative Clauses", grammarDetail:`<h4>Relative Clauses</h4><p><strong>Defining:</strong> Essential info, no commas. <em>The colleague who sits next to me is loud.</em></p><p><strong>Non-defining:</strong> Extra info, commas. <em>My boss, who is from London, speaks 3 languages.</em></p>`, input:"English with Lucy (YouTube): 'Advanced Adjectives'", output:"Write a 150-word character sketch using 8 new adjectives.", words:["conscientious", "adaptable", "resilient", "meticulous", "pragmatic", "ambivalent", "aloof", "gregarious", "prone to", "averse to", "capable of", "dependent on", "suspicious of", "tolerant of", "obsessed with", "disillusioned with", "invaluable", "indispensable", "counterproductive", "detrimental"]},
  {w:3, phase:1, theme:"Travel, Logistics & Movement", vocabFocus:"Phrasal Verbs: Movement (get around, check in, set off)", grammar:"Future Forms Review", grammarDetail:`<h4>Future Forms</h4><p><strong>Will:</strong> Spontaneous decisions, predictions. <em>I'll book it now.</em></p><p><strong>Going to:</strong> Plans, evidence-based predictions. <em>We're going to visit Kyoto.</em></p><p><strong>Present Continuous:</strong> Fixed arrangements. <em>I'm meeting the client at 3pm.</em></p>`, input:"Luke's English Podcast: 'Travel Stories'", output:"Plan a complex 3-city itinerary. Explain logistics to a partner.", words:["set off", "check in", "get away", "stop over", "look around", "get lost", "run out of", "come back", "go ahead", "hold up", "speed up", "slow down", "check out", "drop off", "pick up", "see off", "take off", "touch down", "get through", "look up"]},
  {w:4, phase:1, theme:"Health, Body & Medical Precision", vocabFocus:"Medical collocations (chronic pain, adverse reaction)", grammar:"Modals of Deduction", grammarDetail:`<h4>Modals of Deduction</h4><p><strong>Must be:</strong> 95% sure. <em>He must have a cold.</em></p><p><strong>Might/Could be:</strong> 50% possibility. <em>It might be an allergy.</em></p><p><strong>Can't be:</strong> 95% sure false. <em>He can't be a doctor.</em></p>`, input:"TED Talk: 'What makes a good life?'", output:"Roleplay: Explain symptoms to a doctor precisely.", words:["alleviate", "diagnose", "prescribe", "recover", "susceptible", "immune", "chronic", "acute", "side effect", "dosage", "referral", "consultation", "underlying condition", "preventive measure", "adverse reaction", "contraindication", "remission", "relapse", "prognosis", "palliative"]},
  {w:5, phase:1, theme:"Technology & Digital Life", vocabFocus:"Tech collocations (deploy, scalable, latency)", grammar:"Passive Voice (Processes)", grammarDetail:`<h4>Passive Voice</h4><p><strong>Form:</strong> be + past participle. Focus on action.</p><p><strong>Processes:</strong> <em>The data is encrypted, then transmitted.</em></p><p><strong>Impersonal:</strong> <em>It is believed that... / Users are advised to...</em></p>`, input:"Fireship (YouTube): 'CI/CD in 100 seconds'", output:"Explain a tech problem to a non-tech person (2 min).", words:["troubleshoot", "debug", "deploy", "integrate", "migrate", "latency", "bandwidth", "scalable", "intuitive", "obsolete", "patch", "rollback", "downtime", "throughput", "bottleneck", "refactor", "legacy code", "api endpoint", "authentication", "encryption"]},
  {w:6, phase:1, theme:"Money, Finance & Consumer Rights", vocabFocus:"Financial verbs (accrue, default, leverage)", grammar:"Conditionals (1st, 2nd, 3rd, Mixed)", grammarDetail:`<h4>Conditionals</h4><p><strong>1st:</strong> Real future. <em>If rates rise, I'll remortgage.</em></p><p><strong>2nd:</strong> Hypothetical present. <em>If I were rich, I'd invest.</em></p><p><strong>3rd:</strong> Regret past. <em>If I'd saved, I'd have bought a house.</em></p>`, input:"Planet Money (NPR): 'Inflation explained'", output:"Compare 2 investment options. Write a formal complaint email.", words:["accrue", "default", "leverage", "liquidate", "reimburse", "solvent", "volatile", "asset", "liability", "equity", "dividend", "inflation", "principal", "interest rate", "collateral", "foreclosure", "bankruptcy", "audit", "compliance", "disclosure"]},
  {w:7, phase:1, theme:"Environment & Sustainability", vocabFocus:"Academic nouns (mitigation, biodiversity)", grammar:"Cleft Sentences", grammarDetail:`<h4>Cleft Sentences (Emphasis)</h4><p><strong>It-cleft:</strong> <em>It was the government that failed to act.</em></p><p><strong>Wh-cleft:</strong> <em>What we need is immediate action.</em></p>`, input:"TED: 'The case for optimism on climate change'", output:"Present a 3-min policy argument.", words:["mitigation", "degradation", "biodiversity", "sustainable", "renewable", "emissions", "footprint", "conservation", "advocate", "implement", "legislation", "compliance", "carbon neutral", "net zero", "circular economy", "greenwashing", "deforestation", "acidification", "resilience", "adaptation"]},
  {w:8, phase:1, theme:"PHASE 1 CONSOLIDATION", vocabFocus:"Review Top 150 Collocations", grammar:"Full Tense Review", grammarDetail:`<h4>Consolidation Week</h4><ul><li>Identify top 10 fossilized errors.</li><li>Activate passive vocabulary Weeks 1-7.</li><li>Mock Exam: Reading & Use of English (B2 First).</li></ul>`, input:"Mock Listening Paper (B2 First)", output:"Full Speaking Mock + Writing (Essay).", words:[]},
  {w:9, phase:2, theme:"Idioms & Conceptual Metaphors", vocabFocus:"Body/Nature metaphors", grammar:"Inversion", grammarDetail:`<h4>Inversion</h4><p>Auxiliary before subject after negative adverbials.</p><p><strong>Not only:</strong> <em>Not only did he arrive late...</em></p><p><strong>Seldom/Rarely:</strong> <em>Seldom have I seen...</em></p>`, input:"English Like A Native: '20 Advanced Idioms'", output:"Storytelling: Use 7 idioms in 2-min anecdote.", words:["break the ice", "cost an arm and a leg", "hit the nail on the head", "under the weather", "see eye to eye", "once in a blue moon", "piece of cake", "spill the beans", "pull someone's leg", "beat around the bush", "burn the midnight oil", "food for thought", "digest the information", "swallow the pill", "sharp tongue", "cold shoulder", "heavy heart", "clear the air", "storm in a teacup", "weather the storm"]},
  {w:10, phase:2, theme:"Professional Communication", vocabFocus:"Discourse markers, buzzwords", grammar:"Reported Speech Patterns", grammarDetail:`<h4>Reporting Verbs Patterns</h4><p><strong>Verb + that:</strong> suggest, insist, recommend.</p><p><strong>Verb + to-inf:</strong> agree, promise, refuse.</p><p><strong>Verb + -ing:</strong> deny, admit, suggest.</p><p><strong>Verb + obj + to-inf:</strong> advise, warn, encourage.</p>`, input:"HBR IdeaCast: 'Negotiating with difficult people'", output:"Roleplay: Salary negotiation using 5 markers + 3 reporting verbs.", words:["play devil's advocate", "move the needle", "touch base", "circle back", "bandwidth", "action items", "stakeholder", "consensus", "push back", "buy-in", "roadmap", "deliverable", "low-hanging fruit", "deep dive", "ballpark figure", "on the same page", "take offline", "flag up", "align on", "revert to"]},
  {w:11, phase:2, theme:"Society, Culture & Trends", vocabFocus:"Abstract nouns + collocations", grammar:"Nominalisation", grammarDetail:`<h4>Nominalisation</h4><p>Turning verbs into nouns for density.</p><p><em>We analysed the data -> Our analysis of the data...</em></p><p><strong>Suffixes:</strong> -tion, -ment, -ance, -ity, -ness.</p>`, input:"The Economist / Guardian Long Read", output:"Essay (250w): 'Social media polarisation'.", words:["foster", "exacerbate", "mitigate", "perpetuate", "underpin", "polarize", "cohesion", "disparity", "prevalent", "inevitable", "paradigm", "dichotomy", "alienation", "marginalization", "gentrification", "commodification", "homogenization", "stratification", "mobility", "inequity"]},
  {w:12, phase:2, theme:"Science, Logic & Argumentation", vocabFocus:"Logical connectors (Hence, Albeit)", grammar:"Advanced Connectors", grammarDetail:`<h4>Advanced Connectors</h4><p><strong>Contrast:</strong> Conversely, Whereas, While.</p><p><strong>Concession:</strong> Albeit, Notwithstanding, Admittedly.</p><p><strong>Result:</strong> Hence, Thereby, Consequently.</p>`, input:"Intelligence Squared Debate", output:"Structure formal argument (Toulmin Model).", words:["hence", "thereby", "conversely", "albeit", "notwithstanding", "furthermore", "consequently", "postulate", "hypothesis", "empirical", "anomaly", "correlation", "causation", "variable", "control group", "significant", "margin of error", "peer review", "replicate", "paradigm shift"]},
  {w:13, phase:2, theme:"Arts, Media & Creative Expression", vocabFocus:"Sensory vocab (evocative, poignant)", grammar:"Participle Clauses", grammarDetail:`<h4>Participle Clauses</h4><p><strong>Present (-ing):</strong> Active. <em>The painting, hanging in the Louvre...</em></p><p><strong>Past (-ed):</strong> Passive. <em>Written in 1922, the novel...</em></p><p><strong>Perfect:</strong> <em>Having failed twice, she persisted.</em></p>`, input:"The New Yorker: Fiction Podcast", output:"Write vivid descriptive paragraph (150w). Film/Book review.", words:["evocative", "poignant", "visceral", "nuanced", "ambiguous", "aesthetic", "cathartic", "derivative", "authentic", "cliché", "profound", "superficial", "melancholic", "whimsical", "gritty", "surreal", "resonant", "trite", "hackneyed"]},
  {w:14, phase:2, theme:"Phrasal Verbs Mastery", vocabFocus:"Separable/Inseparable patterns", grammar:"Phrasal Verb Grammar Patterns", grammarDetail:`<h4>Phrasal Verb Patterns</h4><p><strong>Type 2 Separable:</strong> <em>Carry out the task / Carry it out.</em> (Pronoun MIDDLE)</p><p><strong>Type 3 Inseparable:</strong> <em>Look into the matter / Look into it.</em></p>`, input:"Phrasal Verb Daily Podcast (Review 20 eps)", output:"Register Shift: Rewrite 10 formal sentences using phrasals.", words:["carry out", "phase out", "account for", "bring about", "come up with", "do away with", "follow up", "go through", "look into", "put forward", "rule out", "set forth", "point out", "make up for", "result in", "lead to", "consist of", "depend on", "focus on", "deal with"]},
  {w:15, phase:2, theme:"Humor, Sarcasm & Pragmatics", vocabFocus:"Pragmatic markers, Deadpan, Irony", grammar:"Question Tags & Intonation", grammarDetail:`<h4>Question Tags Intonation</h4><p><strong>Falling (↘):</strong> Checking known info. <em>Nice day, isn't it? ↘</em></p><p><strong>Rising (↗):</strong> Genuine question. <em>You didn't lock the door, did you? ↗</em></p>`, input:"Comedy: 'Live at the Apollo' / 'Would I Lie To You?'", output:"Tell a joke with correct timing. Analyse markers.", words:["deadpan", "sarcasm", "irony", "understatement", "hyperbole", "banter", "witty", "droll", "facetious", "tongue-in-cheek", "punchline", "setup", "self-deprecating", "observational", "slapstick", "satire", "parody", "dry humour", "punch up", "punch down"]},
  {w:16, phase:2, theme:"PHASE 2 CONSOLIDATION: B2 MOCK", vocabFocus:"Full Lexical Review", grammar:"Exam Skills (Cloze, Transformations)", grammarDetail:`<h4>Exam Skills (B2 First / IELTS 6.5-7.0)</h4><p><strong>Word Formation:</strong> Prefixes/Suffixes.</p><p><strong>Key Word Transformations:</strong> 3-6 words. Passive, Reported Speech, Conditionals.</p>`, input:"Full Listening Paper (Timed)", output:"Full Speaking Test + Writing (Essay + Article).", words:[]},

// --- 4. PERSISTENCE ---
function loadState() {
  try {
    const saved = localStorage.getItem('fluencyLab_v3');
    if(saved) {
      const p = JSON.parse(saved);
      // Merge preserving functions/structure
      Object.keys(p).forEach(k => { if(!['navigation','classroomTabs','toolCategories','checklistItems','lexiconFilters','dayLessons'].includes(k)) state[k] = p[k]; });
    }
    state.words = state.words || []; state.sessionLog = state.sessionLog || []; state.completedWeeks = state.completedWeeks || [];
    state.dailyChecks = state.dailyChecks || {}; state.settings = state.settings || { dailyGoal:90, newCardsDay:20, targetLevel:'C2', theme:'dark' };
    calculateStreak(); applyTheme();
  } catch(e) { console.error('Load error', e); toast('Error loading data', 'error'); }
}
function saveState() {
  const toSave = { currentView: state.currentView, currentWeek: state.currentWeek, streak: state.streak, lastActive: state.lastActive, totalMinutes: state.totalMinutes, words: state.words, sessionLog: state.sessionLog, completedWeeks: state.completedWeeks, dailyChecks: state.dailyChecks, settings: state.settings, classroomDay: state.classroomDay, activeClassroomTab: state.activeClassroomTab, curriculumFilter: state.curriculumFilter, lexiconFilter: state.lexiconFilter, lexiconSearch: state.lexiconSearch };
  localStorage.setItem('fluencyLab_v3', JSON.stringify(toSave));
}
function calculateStreak() {
  if(!state.lastActive) { state.streak = 0; return; }
  const today = new Date().toDateString(); const last = new Date(state.lastActive).toDateString();
  if(today === last) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  state.streak = (last === yesterday) ? state.streak + 1 : 1;
}
function applyTheme() {
  state.isDark = state.settings.theme === 'dark' || (state.settings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('light', !state.isDark);
  render(); // Re-render to update lucide icons colors if needed
}

const getters = {
  currentWeekData: () => CURRICULUM[state.currentWeek - 1] || CURRICULUM[CURRICULUM.length-1],
  phaseName: () => PHASE_NAMES[getters.currentWeekData().phase] || '',
  todayDay: () => { const ws = state.sessionLog.filter(s => s.week === state.currentWeek).length; return Math.min(Math.max(ws + 1, 1), 6); },
  dueCount: () => state.words.filter(w => w.srs && w.srs.due <= Date.now()).length,
  wordsLearnedCount: () => state.words.filter(w => w.srs?.state === 2).length,
  totalHours: () => (state.totalMinutes / 60).toFixed(1),
  retentionRate: () => { const rev = state.words.filter(w => w.srs?.state === 2); if(!rev.length) return '—'; return Math.round(rev.filter(w => w.srs.ease > 2.2).length / rev.length * 100); },
  estimatedLevel: () => { if(state.currentWeek <= 8) return 'B1→B2'; if(state.currentWeek <= 16) return 'B2'; if(state.currentWeek <= 22) return 'C1'; return 'C2'; },
  isWeekComplete: () => state.completedWeeks.includes(state.currentWeek),
  dailyChecks: () => { const key = `checks_w${state.currentWeek}_d${state.classroomDay}`; return state.dailyChecks[key] || {srs:false, input:false, output:false, grammar:false}; },
  timerDisplay: () => { const m = String(Math.floor(state.timerSeconds/60)).padStart(2,'0'); const s = String(state.timerSeconds%60).padStart(2,'0'); return `${m}:${s}`; },

};

  return `<section class="view p-6 lg:p-10 animate-in"><div class="max-w-6xl mx-auto space-y-8"><header class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4"><div><h2 class="text-3xl lg:text-4xl font-bold tracking-tight">Week <span class="text-cyan-400">${state.currentWeek}</span> <span class="text-gray-500 font-normal text-lg">/ 26</span></h2><p class="text-gray-400 mt-1 text-lg">${w.theme}</p></div><button id="btnEnterClass" class="btn-primary w-full sm:w-auto group flex items-center gap-2"><i data-lucide="play-circle" class="w-5 h-5 group-hover:rotate-12 transition"></i> <span class="hidden sm:inline">Enter Classroom (Day ${getters.todayDay()})</span><span class="sm:hidden">Enter Classroom</span></button></header><div class="grid grid-cols-2 lg:grid-cols-4 gap-4"><div class="card"><div class="text-gray-500 text-sm">Words Learned</div><div class="text-3xl font-bold text-cyan-400">${getters.wordsLearnedCount()}</div></div><div class="card"><div class="text-gray-500 text-sm">Hours Logged</div><div class="text-3xl font-bold text-pink-400">${getters.totalHours()}</div></div><div class="card"><div class="text-gray-500 text-sm">SRS Retention</div><div class="text-3xl font-bold text-green-400">${getters.retentionRate()}%</div></div><div class="card"><div class="text-gray-500 text-sm">Current Level</div><div class="text-3xl font-bold text-yellow-400">${getters.estimatedLevel()}</div></div></div><div class="grid lg:grid-cols-3 gap-6"><div class="lg:col-span-2 card"><h3 class="font-semibold mb-4 flex items-center gap-2"><i data-lucide="clipboard-list" class="w-5 h-5 text-cyan-400"></i> Today's Session Plan (Week ${state.currentWeek})</h3><div class="space-y-3">${[
    `<div class="flex items-center gap-3 p-3 bg-gray-800/50 rounded-xl"><i data-lucide="book-open" class="w-5 h-5 text-cyan-400"></i><div><strong>Vocab Focus:</strong> ${escapeHtml(w.vocabFocus)}</div></div>`,
    `<div class="flex items-center gap-3 p-3 bg-gray-800/50 rounded-xl"><i data-lucide="file-text" class="w-5 h-5 text-pink-400"></i><div><strong>Grammar:</strong> ${escapeHtml(w.grammar)}</div></div>`,
    `<div class="flex items-center gap-3 p-3 bg-gray-800/50 rounded-xl"><i data-lucide="headphones" class="w-5 h-5 text-green-400"></i><div><strong>Input:</strong> ${escapeHtml(w.input)}</div></div>`,
    `<div class="flex items-center gap-3 p-3 bg-gray-800/50 rounded-xl"><i data-lucide="mic" class="w-5 h-5 text-yellow-400"></i><div><strong>Output:</strong> ${escapeHtml(w.output)}</div></div>`
  ].join('')}</div></div><div class="card"><h3 class="font-semibold mb-4 flex items-center gap-2"><i data-lucide="target" class="w-5 h-5 text-pink-400"></i> Weekly Targets</h3><ul class="space-y-3 text-sm">${Object.values(CHECKLIST_ITEMS).map(item=>`<li class="flex items-center gap-3 p-3 bg-gray-800/50 rounded-xl"><i data-lucide="check-circle" class="w-5 h-5 text-green-400 flex-shrink-0"></i><span>${item.label} <strong>${item.time}</strong></span></li>`).join('')}<li class="flex items-center gap-3 p-3 bg-gray-800/50 rounded-xl"><i data-lucide="refresh-cw" class="w-5 h-5 text-cyan-400 flex-shrink-0"></i><span>Review <strong>ALL</strong> due SRS cards (${getters.dueCount()})</span></li></ul></div></div><div class="grid md:grid-cols-3 gap-4">${['srs','input','output'].map(type=>`<button data-action="${type}" class="card text-left group hover:border-${type==='srs'?'cyan':type==='input'?'pink':'green'}-500/50"><i data-lucide="${type==='srs'?'rotate-ccw':type==='input'?'headphones':'mic'}" class="w-6 h-6 text-${type==='srs'?'cyan':type==='input'?'pink':'green'}-400 mb-2"></i><h4 class="font-semibold">${type==='srs'?'SRS Review':type==='input'?'Input Session':'Output Session'}</h4><p class="text-sm text-gray-500 mt-1">${type==='srs'?'Spaced repetition':'Curated native content'}</p></button>`).join('')}</div></div></section>`;
}

function renderClassroom() {
  const w = getters.currentWeekData();
  const checks = getters.dailyChecks();
  const tabContent = renderClassroomTabContent();
  return `<section class="view p-4 lg:p-6"><div class="max-w-7xl mx-auto h-[calc(100vh-2rem)] lg:h-[calc(100vh-3rem)] flex flex-col"><header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4 p-4 card rounded-xl shrink-0"><div class="flex items-center gap-4"><button data-view="dashboard" class="btn-ghost p-2 lg:hidden"><i data-lucide="arrow-left" class="w-5 h-5"></i></button><div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-pink-500 flex items-center justify-center flex-shrink-0"><i data-lucide="graduation-cap" class="w-6 h-6 text-gray-900"></i></div><div><h1 class="font-bold text-xl">${w.theme}</h1><p class="text-sm text-gray-400">Week ${state.currentWeek} • ${getters.phaseName()}</p></div></div><div class="flex flex-wrap items-center gap-2 ml-auto"><span class="btn-xs btn-secondary">Day ${state.classroomDay} of 6</span><button id="prevDay" class="btn-xs btn-secondary" ${state.classroomDay<=1?'disabled':''}><i data-lucide="chevron-left" class="w-4 h-4"></i></button><button id="nextDay" class="btn-xs btn-secondary" ${state.classroomDay>=6?'disabled':''}><i data-lucide="chevron-right" class="w-4 h-4"></i></button><button id="completeWeek" class="btn-xs btn-primary" ${getters.isWeekComplete()?'':'style="display:none"'}><i data-lucide="check-circle-2" class="w-4 h-4 mr-1"></i> Complete Week</button></div></header><div class="flex-1 flex overflow-hidden"><div class="flex-1 overflow-y-auto pr-4 mr-4 border-r border-gray-800"><div role="tablist" class="flex flex-wrap gap-1 mb-4 sticky top-0 bg-gradient-to-b from-transparent via-50% to-[var(--bg)] z-10 pb-4">${CLASSROOM_TABS.map(tab=>`<button data-tab="${tab.id}" class="tab-btn ${state.activeClassroomTab===tab.id?'active':''}" aria-selected="${state.activeClassroomTab===tab.id}"><i data-lucide="${tab.icon}" class="w-4 h-4 mr-1.5"></i> ${tab.label}</button>`).join('')}</div>${tabContent}</div><aside class="w-80 lg:w-88 flex-shrink-0 p-4 space-y-4"><div class="card sticky top-4"><h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="clipboard-check" class="w-5 h-5 text-cyan-400"></i> Daily Checklist</h3><ul class="space-y-2">${Object.entries(CHECKLIST_ITEMS).map(([k,v])=>`<li><label class="flex items-center gap-3 cursor-pointer p-2 rounded-lg hover:bg-gray-800/50 transition"><input type="checkbox" data-check="${v.key}" class="w-5 h-5 rounded border-gray-600 text-cyan-500 focus:ring-cyan-500" ${checks[v.key]?'checked':''}><span class="text-sm">${v.label}</span><span class="ml-auto text-xs text-gray-500">${v.time}</span></label></li>`).join('')}</ul><div class="pt-3 mt-3 border-t border-gray-800"><button id="logSession" class="btn-primary w-full text-sm" ${Object.values(checks).every(v=>v)?'disabled':''}><i data-lucide="save" class="w-4 h-4 mr-1"></i> ${Object.values(checks).every(v=>v)?'Day Logged!':`Log Day (${Math.round(Object.values(checks).filter(v=>v).length/4*100)}%)`}</button></div></div><div class="card"><h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="timer" class="w-5 h-5 text-pink-400"></i> Focus Timer</h3><div class="relative w-40 h-40 mx-auto mb-4"><svg class="w-full h-full progress-ring"><circle class="text-gray-800" stroke-width="6" fill="none" r="60" cx="80" cy="80"></circle><circle class="progress-ring-circle text-cyan-500" stroke-width="6" stroke-linecap="round" fill="none" r="60" cx="80" cy="80" style="stroke-dasharray: 377; stroke-dashoffset: ${377 - (377 * getters.timerProgress() / 100)}"></circle></svg><div class="absolute inset-0 flex flex-col items-center justify-center"><span class="font-mono text-3xl font-bold" id="timerDisplay">${getters.timerDisplay()}</span><span class="text-xs text-gray-500">${state.timerMode}</span></div></div><div class="flex gap-2"><button data-timer="1500" class="btn-secondary flex-1 text-xs">Pomodoro (25)</button><button data-timer="3000" class="btn-secondary flex-1 text-xs">Deep Work (50)</button></div><div class="flex gap-2 mt-2"><button id="timerToggle" class="btn-primary flex-1 text-sm"><i data-lucide="${state.timerRunning?'pause':'play'}" class="w-4 h-4 mr-1"></i> ${state.timerRunning?'Pause':'Resume'}</button><button id="timerReset" class="btn-ghost flex-1 text-sm"><i data-lucide="rotate-ccw" class="w-4 h-4 mr-1"></i> Reset</button></div></div><div class="card"><h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="lightbulb" class="w-5 h-5 text-yellow-400"></i> Quick Tips</h3><ul class="space-y-2 text-sm text-gray-400"><li>💡 <strong>Shadowing:</strong> Repeat 0.5s after audio. Mimic melody.</li><li>🔁 <strong>SRS:</strong> Be honest. "Again" saves time later.</li><li>📝 <strong>Output:</strong> Record audio. Compare tomorrow.</li><li>🎯 <strong>Grammar:</strong> Do 1 exercise type daily.</li></ul></div></aside></div></div></section>`;
}

function renderClassroomTabContent() {
  switch(state.activeClassroomTab) {
    case 'day': return renderDayLesson();
    case 'grammar': return renderGrammarLab();
    case 'vocab': return renderVocabLab();
    case 'shadowing': return renderShadowing();
    case 'output': return renderOutputWorkshop();
    default: return '';
  }
}

function renderDayLesson() {
  const w = getters.currentWeekData();
  const lesson = DAY_LESSONS[state.classroomDay-1] || DAY_LESSONS[0];
  const checks = getters.dailyChecks();
  return `<div class="space-y-6"><header class="card"><h2 class="font-bold text-xl">${lesson.title}</h2><p class="text-gray-400">Day ${state.classroomDay} of Week ${w.w}</p></header>${lesson.tasks.map((t,i)=>`<div class="card p-4 flex items-start gap-4"><input type="checkbox" data-check="task${i}" class="w-5 h-5 mt-1 rounded border-gray-600 text-cyan-500 focus:ring-cyan-500 flex-shrink-0" ${checks[`task${i}`]?'checked':''}><div class="flex-1"><p class="text-gray-300">${t.replace('${w.input}', w.input).replace('${w.output}', w.output)}</p></div></div>`).join('')}</div>`;
}

function renderGrammarLab() {
  const w = getters.currentWeekData();
  // We need to store exercise state in a global var or re-generate on render.
  // For simplicity in Vanilla JS single pass, we render the UI shell and init logic in bindEvents.
  // We'll use a global `grammarExercise` object to hold current state.
  return `<div class="space-y-6"><header class="card"><h2 class="font-bold text-xl">${w.grammar}</h2></header><div class="card">${w.grammarDetail}</div><div class="card"><h3 class="font-semibold mb-4">Interactive Exercises</h3><div class="flex flex-wrap gap-2 mb-4" id="grammarTabs">${['cloze','transform','mcq','wordform'].map(t=>`<button data-ex-type="${t}" class="tab-btn ${window.grammarExerciseType===t?'active':''}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}</div><div id="grammarExerciseContainer" class="space-y-3"></div><div class="flex gap-2 mt-4"><button id="checkAnswers" class="btn-primary" disabled><i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> Check Answers</button><button id="newExercise" class="btn-secondary"><i data-lucide="refresh-cw" class="w-4 h-4 mr-1"></i> New Exercise</button></div></div></div>`;
}

function renderVocabLab() {
  const w = getters.currentWeekData();
  return `<div class="space-y-4"><header class="flex items-center justify-between"><h2 class="font-bold text-xl">Vocab Lab: Week ${w.w}</h2><button id="addWordFromList" class="btn-primary btn-sm"><i data-lucide="plus" class="w-4 h-4 mr-1"></i> Add Word</button></header><div class="card"><input type="text" id="vocabSearch" class="input-field" placeholder="Filter weekly words..."></div><div class="space-y-2" id="weekWordsList">${w.words.map(v=>{const ex=state.words.find(x=>x.headword.toLowerCase()===v.toLowerCase()); const learned=ex?.srs?.state===2, learning=ex?.srs?.state===1; return `<div class="card flex items-center justify-between gap-4 p-3"><div class="flex items-center gap-3"><strong class="text-lg text-cyan-300">${escapeHtml(v)}</strong><span class="word-chip text-xs ${learned?'learned':learning?'learning':''}">${ex?ex.level:'—'}</span>${ex&&ex.ipa?`<span class="text-sm text-gray-400 font-mono">${escapeHtml(ex.ipa)}</span>`:''}</div><div class="flex gap-1"><button data-play="${ex?.audioUrl||''}" class="audio-btn" ${!ex?.audioUrl?'disabled':''} title="Play"><i data-lucide="volume-2" class="w-4 h-4"></i></button>${ex?`<button data-edit="${ex.id}" class="btn-ghost p-2 text-xs">Edit</button>`:`<button data-add-word="${escapeHtml(v)}" class="btn-primary btn-sm text-xs">+ Add</button>`}</div></div>`}).join('')}</div></div>`;
}

function renderShadowing() {
  return `<div class="space-y-4"><header class="card"><h2 class="font-bold text-xl">Shadowing Studio</h2><p class="text-sm text-gray-400">Paste YouTube URL → Load → Practice phrase-by-phrase</p></header><div class="card"><div class="flex gap-2 mb-4"><input type="text" id="shadowUrl" class="input-field flex-1" placeholder="https://youtube.com/watch?v=... or youtu.be/..."><button id="loadShadowVideo" class="btn-primary"><i data-lucide="loader" class="w-4 h-4 mr-1"></i> Load</button></div><div id="shadowVideoContainer" class="aspect-video bg-gray-900 rounded-xl overflow-hidden">${window.shadowVideoId ? `<iframe id="shadow-video" src="https://www.youtube.com/embed/${window.shadowVideoId}?enablejsapi=1" class="w-full h-full" frameborder="0" allowfullscreen></iframe>` : `<div class="w-full h-full flex items-center justify-center text-gray-500"><i data-lucide="film" class="w-16 h-16 mx-auto mb-4 opacity-30"></i><p>Load a video to start</p></div>`}</div></div><div class="card" id="shadowSegments" style="display:${window.shadowSegments?.length>1?'block':'none'}"><h3 class="font-semibold mb-3">Transcript / Segments</h3><div class="max-h-60 overflow-y-auto space-y-1">${(window.shadowSegments||[]).map((s,i)=>`<div class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-800 cursor-pointer ${i===window.shadowCurrentSeg?'bg-cyan-500/10 border border-cyan-500/30':''}" data-seek="${i}"><span class="text-xs text-gray-500 font-mono w-16">${formatTime(s.time)}</span><span class="flex-1 ${i===window.shadowCurrentSeg?'text-cyan-300 font-medium':''}">${escapeHtml(s.text)}</span><button data-speak="${i}" class="audio-btn"><i data-lucide="volume-2" class="w-4 h-4"></i></button></div>`).join('')}</div></div><div class="card bg-gray-900/50 border-cyan-500/30"><h3 class="font-semibold mb-2 text-cyan-400">Keyboard Shortcuts</h3><div class="grid grid-cols-3 gap-2 text-sm text-gray-400"><kbd class="kbd">Space</kbd><span class="col-span-2">Play / Pause</span><kbd class="kbd">← / →</kbd><span class="col-span-2">Seek ∓5s</span><kbd class="kbd">S</kbd><span class="col-span-2">Replay Segment (-3s)</span><kbd class="kbd">N</kbd><span class="col-span-2">Next Segment</span><kbd class="kbd">P</kbd><span class="col-span-2">Previous Segment</span></div></div></div>`;
}
function formatTime(s) { const m=String(Math.floor(s/60)).padStart(2,'0'); const sec=String(s%60).padStart(2,'0'); return `${m}:${sec}`; }

function renderOutputWorkshop() {
  const w = getters.currentWeekData();
  const words = w.words.slice(0,10).join(', ');
  const prompt = `Act as a C2 Cambridge Examiner. Analyze my text below.
TASK: ${w.output}
TARGET VOCAB: ${words}
MY TEXT:
[PASTE YOUR WRITING HERE]

PROVIDE:
1. CORRECTED VERSION (Track changes style: [[incorrect]] → {{correct}})
2. LEXICAL UPGRADES: 3 specific collocations/phrases to replace basic vocabulary.
3. GRAMMAR FOCUS: 1 pattern to review (with explanation).
4. COHESION: Feedback on flow, connectors, paragraphing.
5. ESTIMATED CEFR LEVEL & IELTS/CAE/CPE Band Equivalent.`;
  return `<div class="space-y-6"><header class="card"><h2 class="font-bold text-xl">Output Workshop</h2><p class="text-gray-400">This week's task: ${w.output}</p></header><div class="card"><h3 class="font-semibold mb-3">🗣️ Speaking Practice</h3><textarea id="speakingText" class="input-field min-h-[100px]" placeholder="Write your script here first, then record..."></textarea><div class="flex gap-2 mt-3"><button id="startRecording" class="btn-primary"><i data-lucide="mic" class="w-4 h-4 mr-1"></i> Start 2-min Recording</button><button id="playRecording" class="btn-secondary" disabled><i data-lucide="play" class="w-4 h-4 mr-1"></i> Playback</button><a id="saveRecording" class="btn-ghost hidden"><i data-lucide="download" class="w-4 h-4 mr-1"></i> Save Audio</a></div></div><div class="card"><h3 class="font-semibold mb-3">✍️ Writing Practice</h3><textarea id="writingText" class="input-field min-h-[200px]" placeholder="Write 200-300 words. Target: Use 5+ weekly words."></textarea><div class="mt-3 flex gap-2"><button id="copyAIPrompt" class="btn-primary"><i data-lucide="copy" class="w-4 h-4 mr-1"></i> Copy AI Feedback Prompt</button><button id="countWords" class="btn-secondary"><i data-lucide="calculator" class="w-4 h-4 mr-1"></i> Count Words</button></div></div><div class="card bg-gray-900/50 border-yellow-500/30"><h3 class="font-semibold mb-2 text-yellow-400">🤖 AI Feedback Prompt (Ready to Paste)</h3><pre class="bg-gray-900 p-3 rounded text-sm text-gray-300 overflow-x-auto whitespace-pre-wrap">${escapeHtml(prompt)}</pre></div></div>`;
}

function renderCurriculum() {
  return `<section class="view p-6 lg:p-10"><div class="max-w-6xl mx-auto"><header class="mb-8"><h2 class="text-3xl font-bold">Curriculum Overview</h2><p class="text-gray-400">26 Weeks • ~15-20h/week • Vocabulary-First Approach</p></header><div class="flex flex-wrap gap-2 mb-6" role="tablist">${[['all','All'],[1,'Phase 1: B1→B2 (W1-8)'],[2,'Phase 2: B2 Solid (W9-16)'],[3,'Phase 3: C1 Advanced (W17-22)'],[4,'Phase 4: C2 Mastery (W23-26)']].map(([v,l])=>`<button data-phase="${v}" class="phase-tab ${state.curriculumFilter==v?'btn-primary':'btn-secondary'}">${l}</button>`).join('')}</div><div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">${CURRICULUM.filter(w=>state.curriculumFilter==='all'||w.phase===state.curriculumFilter).map(w=>{const isCurrent=w.w===state.currentWeek; const isDone=state.completedWeeks.includes(w.w); return `<div class="week-card ${isCurrent?'current':''} ${isDone?'done':''}" data-week="${w.w}"><div class="flex items-start justify-between mb-3"><div><span class="text-xs font-semibold text-cyan-400 uppercase tracking-wider">Week ${w.w} • Phase ${w.phase}</span><h4 class="font-bold text-lg mt-1">${escapeHtml(w.theme)}</h4></div>${isDone?'<i data-lucide="check-circle-2" class="w-6 h-6 text-green-400">':isCurrent?'<span class="text-xs bg-cyan-500/20 text-cyan-400 px-2 py-1 rounded">Current</span>':''}</div><div class="text-sm text-gray-400 mb-4 h-16 overflow-hidden">${escapeHtml(w.vocabFocus)}</div><div class="flex flex-wrap gap-1.5 mt-auto">${w.words.slice(0,8).map(v=>`<span class="word-chip text-xs px-2 py-0.5">${escapeHtml(v)}</span>`).join('')}${w.words.length>8?`<span class="word-chip text-xs px-2 py-0.5 text-gray-500">+${w.words.length-8}</span>`:''}</div></div>`}).join('')}</div></div></section>`;
}

function renderSRS() {
  if(!state.srsActive || state.srsIndex >= state.srsQueue.length) {
    const due = getters.dueCount();
    return `<section class="view p-6 lg:p-10"><div class="max-w-4xl mx-auto"><header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8"><div><h2 class="text-3xl font-bold">Spaced Repetition Review</h2><p class="text-gray-400">Algorithm: SM-2 • Due: <span class="font-bold text-cyan-400">${due}</span> cards</p></div><button id="startSRS" class="btn-primary w-full sm:w-auto" ${due===0?'disabled':''}><i data-lucide="play" class="w-4 h-4 mr-2"></i> Start Review Session</button></header><div class="card min-h-[350px] flex items-center justify-center">${due>0?`<div class="text-center text-cyan-400"><i data-lucide="play-circle" class="w-16 h-16 mx-auto mb-4"></i><h3 class="text-2xl font-bold">Ready to Review</h3><p class="text-gray-500 mt-2">${due} cards due</p></div>`:`<div class="text-center text-green-400"><i data-lucide="check-circle-2" class="w-16 h-16 mx-auto mb-4"></i><h3 class="text-2xl font-bold">All Caught Up!</h3><p class="text-gray-500 mt-2">No cards due right now.</p></div>`}</div><div class="mt-6 grid grid-cols-3 gap-4 text-center text-sm">${['new','learning','review'].map((k,i)=>`<div class="card"><div class="text-${k==='new'?'cyan':k==='learning'?'green':'purple'}-400 font-bold text-lg">${getters.srsStats()[k]}</div><div class="text-gray-500">${capitalize(k)}</div></div>`).join('')}</div></div></section>`;
  }
  const card = state.srsQueue[state.srsIndex];

tats()[k]}</div><div class="text-gray-500">${capitalize(k)}</div></div>`).join('')}</div></section>`;

te">"${escapeHtml(w.ex)}"</p>`:''}<div class="flex flex-wrap gap-1 mt-2">${w.tags.map(t=>`<span class="px-2 py-0.5 bg-gray-800 rounded text-xs text-gray-400">${escapeHtml(t)}</span>`).join('')}</div></div><div class="flex items-center gap-1"><button data-play="${w.audioUrl||''}" class="audio-btn" ${!w.audioUrl?'disabled style=opacity:0.3':''} title="Play Audio"><i data-lucide="volume-2" class="w-4 h-4"></i></button><button data-edit="${w.id}" class="btn-ghost p-2" title="Edit"><i data-lucide="pencil" class="w-4 h-4"></i></button><button data-delete="${w.id}" class="btn-ghost p-2 text-red-400 hover:bg-red-900/20" title="Delete"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`}).join('')}</div></div></section>`;

// --- 8. MODALS RENDER (Appended to body via innerHTML in bindEvents or separate container) ---
// We'll handle modals by injecting into a modal-root div.
function ensureModalRoot() { if(!$('#modalRoot')) { const d=document.createElement('div'); d.id='modalRoot'; document.body.appendChild(d); } return $('#modalRoot'); }

function openWordModal(id=null) {
  if(id) { const w=state.words.find(x=>x.id===id); if(!w) return; state.editingWordId=id; state.wordForm={headword:w.headword, ipa:w.ipa||'', def:w.def, ex:w.ex||'', type:w.type, level:w.level, status:w.status, tags:w.tags.join(', '), audioUrl:w.audioUrl||'', loading:false, apiError:''}; }
  else { state.editingWordId=null; state.wordForm={headword:'', ipa:'', def:'', ex:'', type:'word', level:'B2', status:'new', tags:`week-${state.currentWeek}`, audioUrl:'', loading:false, apiError:''}; }
  state.showWordModal=true; renderModals();
}
function closeWordModal() { state.showWordModal=false; state.editingWordId=null; renderModals(); }
function openSessionModal(type) { const w=getters.currentWeekData(); if(type==='srs'){ startSRS(); return; } state.sessionModalTitle=type==='input'?'Input Session':'Output Session'; if(type==='input') state.sessionModalContent=`<div class="space-y-4"><div class="card"><h4 class="font-semibold mb-2">🎧 This Week</h4><p class="text-gray-300">${w.input}</p></div><div class="card"><h4 class="font-semibold mb-2">📝 Active Listening Log</h4><textarea class="input-field min-h-[150px]" placeholder="1. Source/Title:\n2. 3 New phrases:\n3. Main idea:\n4. Shadowing segment (timestamp):"></textarea></div><div class="card"><h4 class="font-semibold mb-2">🔗 Quick Links</h4><div class="flex flex-wrap gap-2"><a href="https://youglish.com" target="_blank" class="btn-secondary text-sm">YouGlish</a><a href="https://skell.sketchengine.eu" target="_blank" class="btn-secondary text-sm">SkELL</a><a href="https://www.ted.com/talks" target="_blank" class="btn-secondary text-sm">TED Talks</a></div></div></div>`; else state.sessionModalContent=`<div class="space-y-4"><div class="card"><h4 class="font-semibold mb-2">🎤 Task</h4><p class="text-gray-300">${w.output}</p></div><div class="card"><h4 class="font-semibold mb-2">🗣️ Speaking (Record)</h4><textarea class="input-field min-h-[100px]" placeholder="Speak 2 min. Record on phone."></textarea><div class="mt-3"><button class="btn-secondary text-sm" onclick="startQuickRecording()"><i data-lucide="mic" class="w-4 h-4 mr-1"></i> Start 2-min Recording</button></div></div><div class="card"><h4 class="font-semibold mb-2">✍️ Writing</h4><textarea class="input-field min-h-[200px]" placeholder="Write 200-300w. Use 5 weekly words. Paste into LanguageTool after."></textarea></div><div class="card bg-gray-900/50 border-yellow-500/30"><h4 class="font-semibold mb-2 text-yellow-400">🤖 AI Feedback Prompt</h4><pre class="bg-gray-900 p-3 rounded text-sm text-gray-300 overflow-x-auto whitespace-pre-wrap">Act as C2 examiner. Correct my text. Give: 1. Corrected version. 2. 3 Better lexical choices. 3. 1 Grammar pattern to review. 4. CEFR estimate.
Text: [PASTE HERE]</pre></div></div>`; state.sessionTimerSeconds=state.settings.dailyGoal*60; state.showSessionModal=true; startSessionTimer(); renderModals(); }
function closeSessionModal() { state.showSessionModal=false; clearInterval(state.sessionTimerInterval); renderModals(); }
function openWeekModal(num) { state.selectedWeekNum=num; state.selectedWeekData=CURRICULUM[num-1]; state.showWeekModal=true; renderModals(); }
function closeWeekModal() { state.showWeekModal=false; renderModals(); }
function confirmReset() { state.showConfirmReset=true; renderModals(); }

function renderModals() {
  const root = ensureModalRoot();
  let html = '';
  if(state.showWordModal) html += renderWordModal();
  if(state.showSessionModal) html += renderSessionModal();
  if(state.showWeekModal) html += renderWeekModal();
  if(state.showConfirmReset) html += renderConfirmResetModal();
  root.innerHTML = html;
  lucide.createIcons();
  // Bind modal specific events
  $('#wordForm')?.addEventListener('submit', saveWord);
  $('#fetchWordBtn')?.addEventListener('click', fetchWordData);
  $$('.sr-btn[data-grade]').forEach(b=>b.onclick=()=>answerSRS(parseInt(b.dataset.grade)));
  $$('#modalRoot .modal-overlay').forEach(m=>m.onclick=e=>{if(e.target===m){ if(m.querySelector('#wordForm')) closeWordModal(); else if(m.querySelector('#sessionTimerDisplay')) closeSessionModal(); else if(m.querySelector('[data-week-close]')) closeWeekModal(); else state.showConfirmReset=false; renderModals(); }});
}

function renderWordModal() { return `<div class="modal-overlay" onclick="event.target===this && closeWordModal()"><div class="modal-box max-w-2xl"><div class="modal-header"><h3 class="text-lg font-bold">${state.editingWordId?'Edit Word':'Add New Word'}</h3><button onclick="closeWordModal()" class="btn-ghost p-2"><i data-lucide="x" class="w-5 h-5"></i></button></div><form id="wordForm" class="modal-body space-y-4"><div class="grid gap-4 md:grid-cols-2"><div><label class="block text-sm text-gray-400 mb-1">Headword / Phrase *</label><input type="text" id="wHeadword" class="input-field" required value="${escapeHtml(state.wordForm.headword)}" placeholder="e.g., mitigate, come up with"></div><div><label class="block text-sm text-gray-400 mb-1">IPA / Pronunciation</label><input type="text" id="wIpa" class="input-field" value="${escapeHtml(state.wordForm.ipa)}" placeholder="/ˈmɪt.ɪ.ɡeɪt/" readonly></div></div><div class="flex items-center gap-2"><button type="button" id="fetchWordBtn" class="btn-secondary btn-sm" ${!state.wordForm.headword||state.wordForm.loading?'disabled':''}><i data-lucide="sparkles" class="w-4 h-4 mr-1"></i> <span>${state.wordForm.loading?'Fetching...':'Auto-Fill from Dictionary'}</span></button><span class="text-xs text-red-400" ${state.wordForm.apiError?'':'style="display:none"'}>${escapeHtml(state.wordForm.apiError)}</span></div><div><label class="block text-sm text-gray-400 mb-1">Definition *</label><textarea id="wDef" class="input-field min-h-[80px]" required>${escapeHtml(state.wordForm.def)}</textarea></div><div><label class="block text-sm text-gray-400 mb-1">Example Sentence</label><textarea id="wEx" class="input-field min-h-[60px]">${escapeHtml(state.wordForm.ex)}</textarea></div><div class="grid gap-4 md:grid-cols-3"><div><label class="block text-sm text-gray-400 mb-1">Type</label><select id="wType" class="input-field">${['word','collocation','phrasal','idiom','connector','academic'].map(v=>`<option value="${v}" ${state.wordForm.type===v?'selected':''}>${capitalize(v)}</option>`).join('')}</select></div><div><label class="block text-sm text-gray-400 mb-1">CEFR Level</label><select id="wLevel" class="input-field">${['B1','B2','C1','C2'].map(v=>`<option value="${v}" ${state.wordForm.level===v?'selected':''}>${v}</option>`).join('')}</select></div><div><label class="block text-sm text-gray-400 mb-1">Status</label><select id="wStatus" class="input-field">${['new','learning','learned'].map(v=>`<option value="${v}" ${state.wordForm.status===v?'selected':''}>${capitalize(v)}</option>`).join('')}</select></div></div><div><label class="block text-sm text-gray-400 mb-1">Tags (comma separated)</label><input type="text" id="wTags" class="input-field" value="${escapeHtml(state.wordForm.tags)}" placeholder="business, formal, week-1"></div><input type="hidden" id="wAudioUrl" value="${escapeHtml(state.wordForm.audioUrl)}"><div class="flex justify-end gap-3 pt-4 border-t border-gray-800"><button type="button" onclick="closeWordModal()" class="btn-secondary">Cancel</button><button type="submit" class="btn-primary"><i data-lucide="save" class="w-4 h-4 mr-2"></i> Save Word</button></div></form></div></div>`; }
function renderSessionModal() { return `<div class="modal-overlay" onclick="event.target===this && closeSessionModal()"><div class="modal-box max-w-3xl"><div class="modal-header"><h3 class="text-lg font-bold">${escapeHtml(state.sessionModalTitle)}</h3><div class="flex items-center gap-4"><span class="font-mono text-cyan-400 text-lg" id="sessionTimerDisplay">${getters.sessionTimerDisplay?getters.sessionTimerDisplay():'--:--'}</span><button onclick="closeSessionModal()" class="btn-ghost p-2"><i data-lucide="x" class="w-5 h-5"></i></button></div></div><div class="modal-body">${state.sessionModalContent}</div></div></div>`; }
function renderWeekModal() { const w=state.selectedWeekData; if(!w) return ''; const isDone=state.completedWeeks.includes(w.w); return `<div class="modal-overlay" onclick="event.target===this && closeWeekModal()"><div class="modal-box max-w-3xl"><div class="modal-header"><h3 class="text-lg font-bold" data-week-close>Week ${w.w}: ${escapeHtml(w.theme)}</h3><button onclick="closeWeekModal()" class="btn-ghost p-2"><i data-lucide="x" class="w-5 h-5"></i></button></div><div class="modal-body"><div class="space-y-6"><div class="grid gap-4 md:grid-cols-2"><div class="card"><h4 class="font-semibold mb-2 flex items-center gap-2"><i data-lucide="target" class="w-4 h-4 text-cyan-400"></i> Vocab Focus</h4><p class="text-gray-300">${escapeHtml(w.vocabFocus)}</p></div><div class="card"><h4 class="font-semibold mb-2 flex items-center gap-2"><i data-lucide="code" class="w-4 h-4 text-pink-400"></i> Grammar Focus</h4><p class="text-gray-300">${escapeHtml(w.grammar)}</p></div></div><div class="card"><h4 class="font-semibold mb-2 flex items-center gap-2"><i data-lucide="headphones" class="w-4 h-4 text-green-400"></i> Comprehensible Input</h4><p class="text-gray-300">${escapeHtml(w.input)}</p></div><div class="card"><h4 class="font-semibold mb-2 flex items-center gap-2"><i data-lucide="mic" class="w-4 h-4 text-yellow-400"></i> Output Task</h4><p class="text-gray-300">${escapeHtml(w.output)}</p></div><div class="card"><h4 class="font-semibold mb-2 flex items-center gap-2"><i data-lucide="list" class="w-4 h-4 text-purple-400"></i> Target Vocabulary (${w.words.length})</h4><div class="flex flex-wrap gap-2">${w.words.map(v=>{const ex=state.words.find(x=>x.headword.toLowerCase()===v.toLowerCase()); return `<span class="word-chip ${ex?(ex.srs?.state===2?'learned':ex.srs?.state===1?'learning':'':''}">${escapeHtml(v)}</span>`}).join('')}</div></div><div class="flex gap-3 pt-4 border-t border-gray-800"><button onclick="startWeekSession(${w.w})" class="btn-primary flex-1"><i data-lucide="play" class="w-4 h-4 mr-2"></i> Start Session</button><button onclick="toggleWeekComplete(${w.w})" class="btn-secondary flex-1">${isDone?'<i data-lucide="rotate-ccw" class="w-4 h-4 mr-2"></i> Mark Incomplete':'<i data-lucide="check" class="w-4 h-4 mr-2"></i> Mark Complete'}</button></div></div></div></div></div>`; }
